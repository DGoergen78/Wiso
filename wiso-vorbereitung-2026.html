*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}.container{max-width:740px;margin:0 auto;padding:32px 20px}.start-screen{text-align:center;padding-top:40px;animation:fadeIn .5s ease}.start-screen h1{font-size:28px;font-weight:800;color:#f1f5f9;line-height:1.3;margin-bottom:8px}.start-screen .desc{font-size:15px;color:#94a3b8;margin-bottom:24px}.cfg-section{margin-bottom:24px;text-align:left;background:#1e293b;padding:20px 24px;border-radius:14px}.cfg-label{font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:10px}.cfg-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.cfg-btn{padding:8px 18px;border-radius:20px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;border:2px solid #334155;background:transparent;color:#94a3b8;transition:all .2s}.cfg-btn.active{background:#6366f1;color:#fff;border-color:#6366f1}.cfg-btn:hover:not(.active){border-color:#818cf8;color:#e2e8f0}.btn-start{display:block;margin:0 auto;padding:16px 52px;background:linear-gradient(135deg,#6366f1,#a78bfa);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 28px rgba(99,102,241,.35);transition:transform .2s}.btn-start:hover{transform:scale(1.05)}.progress-wrap{margin-bottom:28px}.progress-info{display:flex;justify-content:space-between;font-size:13px;color:#64748b;margin-bottom:6px}.progress-info .stats{display:flex;gap:14px}.progress-info .correct{color:#22c55e}.progress-info .wrong{color:#ef4444}.progress-bar{height:5px;background:#1e293b;border-radius:3px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a78bfa);border-radius:3px;transition:width .4s ease}.question-wrap{animation:slideIn .35s ease}.question-num{color:#818cf8;font-weight:700;margin-right:8px}.cat-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;text-transform:uppercase;letter-spacing:.5px;vertical-align:middle}.cat-badge.S{background:rgba(59,130,246,.15);color:#60a5fa}.cat-badge.W{background:rgba(234,179,8,.15);color:#fbbf24}.question-text{font-size:17px;font-weight:600;line-height:1.55;color:#f1f5f9;margin-bottom:22px}.options{display:flex;flex-direction:column;gap:10px}.option-btn{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:13px 18px;border-radius:10px;cursor:pointer;text-align:left;font-size:15px;font-family:inherit;transition:all .2s;line-height:1.45}.option-btn:hover:not(:disabled){background:#334155;border-color:#818cf8}.option-btn:disabled{cursor:default}.option-btn .letter{font-weight:700;color:#818cf8;margin-right:10px}.option-btn.is-correct{background:rgba(34,197,94,.13);border-color:#22c55e;color:#86efac}.option-btn.is-correct .letter{color:#22c55e}.option-btn.is-wrong{background:rgba(239,68,68,.13);border-color:#ef4444;color:#fca5a5}.option-btn.dimmed{opacity:.45}.match-item{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px 16px;margin-bottom:12px;transition:all .3s}.match-item.is-correct{background:rgba(34,197,94,.08);border-color:#22c55e}.match-item.is-wrong{background:rgba(239,68,68,.08);border-color:#ef4444}.match-item .text{font-size:14px;color:#e2e8f0;margin-bottom:10px;line-height:1.5}.match-item .correction{font-size:12px;color:#86efac;margin-top:8px}.match-btns{display:flex;gap:7px;flex-wrap:wrap}.match-btn{padding:5px 14px;border-radius:20px;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid #334155;background:#0f172a;color:#94a3b8;transition:all .2s}.match-btn:disabled{cursor:default}.match-btn.selected{background:#6366f1;color:#fff;border-color:transparent;font-weight:600}.match-btn.selected-correct{background:#22c55e;color:#fff;border-color:transparent;font-weight:600}.match-btn.selected-wrong{background:#ef4444;color:#fff;border-color:transparent;font-weight:600}.btn-check{margin-top:18px;padding:12px 30px;background:#334155;color:#64748b;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:not-allowed;transition:all .2s}.btn-check.active{background:#6366f1;color:#fff;cursor:pointer}.btn-check.active:hover{background:#818cf8}.explanation{margin-top:22px;padding:16px 20px;border-radius:12px;border-left:4px solid;animation:fadeIn .3s ease}.explanation.correct{background:rgba(34,197,94,.07);border-color:#22c55e}.explanation.wrong{background:rgba(239,68,68,.07);border-color:#ef4444}.explanation .verdict{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}.explanation.correct .verdict{color:#22c55e}.explanation.wrong .verdict{color:#ef4444}.explanation .expl-text{font-size:14px;color:#cbd5e1;line-height:1.65}.next-row{text-align:right;margin-top:20px}.btn-next{padding:12px 32px;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}.btn-next:hover{background:#818cf8}.result-screen{text-align:center;animation:fadeIn .5s ease}.result-screen .emoji{font-size:60px;margin-bottom:12px}.result-screen h1{font-size:26px;font-weight:800;color:#f1f5f9;margin-bottom:10px}.result-screen .pct{font-size:52px;font-weight:800;margin-bottom:4px}.result-screen .pct.pass{color:#22c55e}.result-screen .pct.fail{color:#ef4444}.result-screen .count{font-size:15px;color:#94a3b8;margin-bottom:6px}.result-screen .grade{font-size:20px;font-weight:700;color:#a78bfa;margin-bottom:24px}.result-section-title{font-size:14px;color:#64748b;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;text-align:left;font-weight:700}.result-item{padding:12px 16px;margin-bottom:7px;border-radius:10px;text-align:left;border-left:3px solid}.result-item.c{background:rgba(34,197,94,.06);border-color:#22c55e}.result-item.w{background:rgba(239,68,68,.06);border-color:#ef4444}.result-item .q-text{font-size:13px;color:#e2e8f0;line-height:1.4}.result-item .q-num{color:#818cf8;font-weight:700}.result-item .q-verdict{font-size:11px;margin-top:4px;font-weight:600}.result-item.c .q-verdict{color:#86efac}.result-item.w .q-verdict{color:#fca5a5}.result-item .q-expl{font-size:12px;color:#94a3b8;margin-top:4px;line-height:1.5;display:none}.result-item.open .q-expl{display:block}.result-item{cursor:pointer}.btn-restart{padding:14px 40px;background:linear-gradient(135deg,#6366f1,#a78bfa);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:28px;transition:transform .2s}.btn-restart:hover{transform:scale(1.05)}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

<script>
var ALL_QUESTIONS = [{"id": 1, "type": "single", "cat": "S", "question": "Was ist eine Opposition?", "options": ["Die im Parlament vertretenen Parteien, die nicht an der Regierung beteiligt sind und deren Politik kritisieren", "Der Zusammenschluss aller im Bundestag vertretenen Fraktionen zu einer gemeinsamen Regierungskoalition", "Ein parlamentarisches Gremium, das alle Parteien gleichberechtigt in die Gesetzgebung einbindet", "Die Länderkammer als kontrollierendes Gegengewicht zur Arbeit der Bundesregierung im Bundestag"], "correct": 0, "explanation": "Die Opposition besteht aus den Parteien im Parlament, die nicht an der Regierung beteiligt sind. Sie kontrolliert die Regierung, kritisiert deren Politik und stellt Alternativen vor. Im aktuellen Bundestag (2026) bilden u.a. Grüne, FDP, AfD und BSW die Opposition gegenüber der schwarz-roten Regierung aus CDU/CSU und SPD."}, {"id": 2, "type": "single", "cat": "S", "question": "Was ist eine Koalition?", "options": ["Ein Regierungsbündnis mehrerer Parteien für die Dauer einer Legislaturperiode zur gemeinsamen Regierungsarbeit", "Der Zusammenschluss aller Oppositionsparteien zur gemeinsamen Kontrolle der amtierenden Regierung", "Ein auf Bundesebene geschlossenes politisches Bündnis zwischen Bund und sämtlichen Bundesländern", "Die verfassungsrechtlich vorgesehene Vereinigung der Kompetenzen von Bundestag und Bundesrat"], "correct": 0, "explanation": "Eine Koalition ist ein Regierungsbündnis von zwei oder mehr Parteien, die gemeinsam eine Regierung bilden, weil keine Partei allein die Mehrheit im Parlament hat. Die Koalitionspartner einigen sich in einem Koalitionsvertrag auf gemeinsame politische Ziele für die Legislaturperiode (4 Jahre)."}, {"id": 3, "type": "single", "cat": "S", "question": "Welche Parteien bilden aktuell (2026) die Bundesregierung?", "options": ["SPD, Grüne und FDP", "CDU/CSU und SPD", "CDU/CSU und Grüne", "SPD und Grüne"], "correct": 1, "explanation": "Seit Mai 2025 regiert eine Koalition aus CDU/CSU und SPD (Schwarz-Rot) unter Bundeskanzler Friedrich Merz (CDU). Die vorherige Ampelkoalition (SPD, Grüne, FDP) unter Olaf Scholz war Ende 2024 zerbrochen, woraufhin im Februar 2025 Neuwahlen stattfanden."}, {"id": 4, "type": "single", "cat": "W", "question": "Was ist ein Angebotsmonopol?", "options": ["Eine Marktsituation mit nur einem Anbieter für ein Gut", "Ein Markt mit vielen Anbietern und einem Nachfrager", "Ein Markt mit wenigen Anbietern und vielen Nachfragern", "Ein staatlich regulierter Markt ohne Wettbewerb"], "correct": 0, "explanation": "Ein Angebotsmonopol liegt vor, wenn es für ein wirtschaftliches Gut nur einen einzigen Anbieter gibt, aber viele Nachfrager. Der Monopolist kann den Preis weitgehend selbst bestimmen. Historisches Beispiel: Die Deutsche Post hatte früher ein Briefmonopol. Kartellgesetze sollen solche Monopolbildungen verhindern."}, {"id": 5, "type": "single", "cat": "W", "question": "Wie funktioniert eine Planwirtschaft?", "options": ["Angebot und Nachfrage bestimmen auf freien Märkten die Produktion und die Preisbildung der Güter", "Eine zentrale Verwaltung trifft alle wesentlichen Entscheidungen über Produktion und Ressourcenverteilung", "Privatunternehmen konkurrieren ohne staatliche Eingriffe frei miteinander um Marktanteile und Kunden", "Der Staat reguliert lediglich die Sozialversicherungen und überlässt die Wirtschaft ansonsten dem Markt"], "correct": 1, "explanation": "In einer Planwirtschaft (Zentralverwaltungswirtschaft) werden alle wesentlichen wirtschaftlichen Entscheidungen von einer zentralen staatlichen Stelle getroffen: Was wird produziert, wie viel, zu welchem Preis und für wen. Arbeit, Kapital und Boden werden zentral zugeteilt. Historisches Beispiel: die DDR und die Sowjetunion."}, {"id": 6, "type": "single", "cat": "W", "question": "Was versteht man unter Beweislastumkehr beim Kaufvertrag?", "options": ["Der Verkäufer muss in jedem Fall nachweisen, dass die gelieferte Ware zum Zeitpunkt der Übergabe mangelfrei war", "Zeigt sich innerhalb von 12 Monaten ein Mangel, wird vermutet, dass er schon bei Übergabe vorlag; danach muss der Käufer den Beweis führen", "Der Käufer trägt grundsätzlich immer selbst die Pflicht zu beweisen, dass ein Mangel an der Ware vorliegt", "Nach Ablauf von 6 Monaten seit dem Kauf verfällt automatisch jeglicher gesetzlicher Gewährleistungsanspruch"], "correct": 1, "explanation": "Bei der Beweislastumkehr wird innerhalb der ersten 12 Monate nach Gefahrübergang (Kauf) vermutet, dass ein auftretender Sachmangel bereits bei der Übergabe vorhanden war. Der Verkäufer müsste das Gegenteil beweisen. Nach 12 Monaten kehrt sich die Beweislast um: Nun muss der Käufer nachweisen, dass der Mangel von Anfang an bestand. Seit dem 01.01.2022 gilt diese verlängerte Frist."}, {"id": 7, "type": "single", "cat": "S", "question": "Von wem wird der Bundeskanzler gewählt und wie lange dauert seine Amtszeit?", "options": ["Vom gesamten Wahlvolk in einer direkten Volkswahl für eine Amtszeit von insgesamt fünf Jahren", "Vom Bundestag für 4 Jahre (eine Legislaturperiode)", "Vom Bundesrat als Vertretung der Bundesländer für eine reguläre Amtsdauer von vier Jahren", "Vom Bundespräsidenten nach eigenem Ermessen ernannt für eine sechsjährige Amtsperiode"], "correct": 1, "explanation": "Der Bundeskanzler wird vom Deutschen Bundestag auf Vorschlag des Bundespräsidenten gewählt (Art. 63 GG). Die Amtszeit entspricht der Legislaturperiode des Bundestages, also 4 Jahre. Eine Wiederwahl ist unbegrenzt möglich. Der aktuelle Bundeskanzler Friedrich Merz (CDU) wurde im Mai 2025 vom Bundestag gewählt."}, {"id": 8, "type": "single", "cat": "S", "question": "Was versteht man unter dem Generationenvertrag in der Rentenversicherung?", "options": ["Jeder Beschäftigte spart über sein Berufsleben hinweg individuell für seine eigene spätere Rente an", "Die Erwerbstätigen zahlen mit ihren Beiträgen die Renten der aus dem Erwerbsleben ausgeschiedenen Personen (Umlageverfahren)", "Der Staat finanziert sämtliche Rentenzahlungen vollständig und ausschließlich aus dem allgemeinen Steueraufkommen", "Die eingezahlten Rentenbeiträge werden am Kapitalmarkt angelegt und die Erträge als Renten ausgezahlt"], "correct": 1, "explanation": "Der Generationenvertrag beschreibt das Umlageverfahren der deutschen Rentenversicherung: Die aktuell erwerbstätigen Menschen finanzieren mit ihren Beiträgen direkt die Renten der heutigen Rentner. Es wird kein Kapital angespart. Im Gegenzug erwartet die heutige Generation, dass die nächste Generation später ihre Renten finanziert."}, {"id": 9, "type": "single", "cat": "S", "question": "Was ist die Hauptproblematik des Generationenvertrags?", "options": ["Die aktuell ausgezahlten Renten sind im Verhältnis zur Wirtschaftsleistung und den Beitragseinnahmen viel zu hoch angesetzt", "Weniger Beitragszahler müssen immer mehr Rentner finanzieren (demografischer Wandel), und der medizinische Fortschritt sorgt für längere Lebenserwartung", "Zu viele junge und gut ausgebildete Fachkräfte wandern dauerhaft aus Deutschland in andere Länder aus und fehlen als Beitragszahler", "Die zuständigen Rentenversicherungsträger berechnen die Höhe der fälligen Beiträge regelmäßig auf fehlerhaften statistischen Grundlagen"], "correct": 1, "explanation": "Das größte Problem: Durch den demografischen Wandel gibt es immer weniger Erwerbstätige (sinkende Geburtenrate), die immer mehr Rentner finanzieren müssen. Gleichzeitig steigt durch den medizinischen Fortschritt die Lebenserwartung, sodass Renten länger gezahlt werden müssen."}, {"id": 10, "type": "matching", "cat": "S", "question": "Ordnen Sie: Welche der folgenden gehören zu den fünf gesetzlichen Sozialversicherungen?", "pairs": [{"item": "Krankenversicherung", "match": "Ja"}, {"item": "Unfallversicherung", "match": "Ja"}, {"item": "Pflegeversicherung", "match": "Ja"}, {"item": "Arbeitslosenversicherung", "match": "Ja"}, {"item": "Rentenversicherung", "match": "Ja"}, {"item": "Haftpflichtversicherung", "match": "Nein"}], "matchOptions": ["Ja", "Nein"], "explanation": "Die fünf Säulen der gesetzlichen Sozialversicherung: Krankenversicherung, Unfallversicherung, Pflegeversicherung, Arbeitslosenversicherung und Rentenversicherung. Die Haftpflichtversicherung ist eine private Versicherung."}, {"id": 11, "type": "single", "cat": "W", "question": "Welche der gesetzlichen Sozialversicherungen wird vollständig vom Arbeitgeber getragen?", "options": ["Krankenversicherung", "Rentenversicherung", "Unfallversicherung", "Pflegeversicherung"], "correct": 2, "explanation": "Die gesetzliche Unfallversicherung (Berufsgenossenschaft) wird allein vom Arbeitgeber finanziert. Bei allen anderen vier Sozialversicherungen teilen sich Arbeitgeber und Arbeitnehmer die Beiträge etwa hälftig."}, {"id": 12, "type": "single", "cat": "W", "question": "Was bedeutet unbeschränkte Geschäftsfähigkeit?", "options": ["Bereits mit Vollendung des 16. Lebensjahres darf man ohne Einschränkungen eigenständig Verträge schließen", "Mit Vollendung des 18. Lebensjahres darf man vollgültige Rechtsgeschäfte eigenständig abschließen", "Von Geburt an besitzt jeder Mensch das uneingeschränkte Recht, rechtswirksame Verträge abzuschließen", "Für alle Rechtsgeschäfte ist grundsätzlich immer die schriftliche Zustimmung der Eltern erforderlich"], "correct": 1, "explanation": "Mit Vollendung des 18. Lebensjahres beginnt die unbeschränkte Geschäftsfähigkeit (§ 2 BGB). Man kann dann alle Rechtsgeschäfte eigenständig abschließen. Vorher: Unter 7 Jahren geschäftsunfähig, 7–17 Jahre beschränkt geschäftsfähig (Taschengeldparagraph § 110 BGB)."}, {"id": 13, "type": "single", "cat": "W", "question": "Ab welchem Alter ist man rechtsfähig und was bedeutet das?", "options": ["Ab dem vollendeten 18. Lebensjahr; ab diesem Zeitpunkt darf man eigenständig Verträge abschließen", "Ab der Geburt; man kann Träger von Rechten und Pflichten sein", "Ab dem vollendeten 7. Lebensjahr; ab dann darf man selbständig kleine alltägliche Einkäufe tätigen", "Ab dem vollendeten 14. Lebensjahr; ab diesem Alter ist man im Sinne des Strafrechts strafmündig"], "correct": 1, "explanation": "Rechtsfähigkeit beginnt mit der Vollendung der Geburt (§ 1 BGB) und endet mit dem Tod. Rechtsfähig bedeutet, Träger von Rechten und Pflichten zu sein – z.B. kann ein Baby bereits erben. Nicht verwechseln mit Geschäftsfähigkeit (Fähigkeit, selbst Rechtsgeschäfte abzuschließen)."}, {"id": 14, "type": "single", "cat": "S", "question": "Wofür steht die Abkürzung SPD?", "options": ["Sozialistische Partei Deutschlands", "Sozialdemokratische Partei Deutschlands", "Sozialpolitische Partei Deutschlands", "Solidaritätspartei Deutschlands"], "correct": 1, "explanation": "SPD steht für Sozialdemokratische Partei Deutschlands. Sie wurde 1863 gegründet und ist eine der ältesten Parteien Deutschlands. Ihre Farbe ist Rot. Bekannte SPD-Kanzler waren Willy Brandt, Helmut Schmidt, Gerhard Schröder und Olaf Scholz."}, {"id": 15, "type": "single", "cat": "W", "question": "Wie kann während der Probezeit ein Ausbildungsverhältnis gekündigt werden?", "options": ["Ausschließlich der Arbeitgeber hat das Recht zu kündigen, wobei er eine Frist von 4 Wochen einhalten muss", "Von beiden Seiten ohne Einhaltung einer Kündigungsfrist (jederzeit, schriftlich)", "Eine Kündigung ist nur mit ausdrücklicher vorheriger Zustimmung der zuständigen Handwerkskammer möglich", "Während der gesamten Probezeit ist das Ausbildungsverhältnis für keine der beiden Seiten kündbar"], "correct": 1, "explanation": "Während der Probezeit kann das Ausbildungsverhältnis von beiden Seiten jederzeit ohne Angabe von Gründen und ohne Kündigungsfrist gekündigt werden. Die Kündigung muss schriftlich erfolgen (§ 22 Abs. 1 BBiG)."}, {"id": 16, "type": "matching", "cat": "W", "question": "Ordnen Sie die Beispiele dem richtigen ökonomischen Prinzip zu.", "pairs": [{"item": "Mit möglichst wenig Benzin nach Saarbrücken fahren", "match": "Minimalprinzip"}, {"item": "Mit 20 Litern Benzin soweit wie möglich fahren", "match": "Maximalprinzip"}, {"item": "Den günstigsten Handwerker für eine bestimmte Leistung wählen", "match": "Minimalprinzip"}, {"item": "Mit dem vorhandenen Budget den größten Nutzen erzielen", "match": "Maximalprinzip"}], "matchOptions": ["Minimalprinzip", "Maximalprinzip"], "explanation": "Minimalprinzip: Ein vorgegebenes Ergebnis mit möglichst geringem Aufwand erreichen. Maximalprinzip: Mit einem vorgegebenen Aufwand das bestmögliche Ergebnis erzielen. Beide sind Ausdruck wirtschaftlichen Handelns."}, {"id": 17, "type": "single", "cat": "W", "question": "Was ist das Hauptziel eines Unternehmens?", "options": ["Möglichst viele Mitarbeiter einstellen", "Gewinnsteigerung oder Sicherung von Marktanteilen", "Steuern an den Staat zahlen", "Möglichst hohe Löhne zahlen"], "correct": 1, "explanation": "Das wirtschaftliche Hauptziel eines Unternehmens ist die Gewinnmaximierung oder die Sicherung und der Ausbau von Marktanteilen. Daneben gibt es soziale Ziele (gute Arbeitsbedingungen) und ökologische Ziele (Umweltschutz)."}, {"id": 18, "type": "single", "cat": "W", "question": "Welche Vorteile hat die Gewerkschaftsmitgliedschaft für Arbeitnehmer?", "options": ["Das Gehalt wird durch die Mitgliedschaft automatisch und ohne weitere Verhandlungen regelmäßig erhöht", "Sicherere Arbeitsplätze, Vertretung gemeinsamer Interessen und Abschluss von Tarifverträgen", "Gewerkschaftsmitglieder sind vollständig von der Pflicht zur Zahlung von Einkommensteuer befreit", "Nach dem Beitritt zur Gewerkschaft genießt man absoluten Schutz vor jeder Form der Kündigung"], "correct": 1, "explanation": "Gewerkschaftsmitglieder profitieren von: Vertretung ihrer Interessen gegenüber Arbeitgebern, Abschluss von Tarifverträgen (bessere Löhne und Arbeitsbedingungen), Rechtsschutz bei arbeitsrechtlichen Streitigkeiten und Streikgeld bei Arbeitskampf."}, {"id": 19, "type": "single", "cat": "W", "question": "Was ist der Sinn einer Urabstimmung beim Tarifvertrag?", "options": ["Die amtierende Bundesregierung stimmt zusammen mit den Ländern über den neuen Tarifvertrag ab", "Mindestens 75% der Gewerkschaftsmitglieder müssen für einen Streik stimmen; für die Annahme eines neuen Tarifvertrags genügen 25%", "Sämtliche Arbeitnehmer eines Betriebs, ob Gewerkschaftsmitglied oder nicht, stimmen über ihre Löhne ab", "Der Arbeitgeber selbst stimmt in einer geheimen Abstimmung über die Tarifforderungen der Gewerkschaft ab"], "correct": 1, "explanation": "Die Urabstimmung ist eine demokratische Abstimmung unter den Gewerkschaftsmitgliedern. Damit gestreikt werden darf, müssen mindestens 75% dafür stimmen. Um einen neuen Tarifvertrag anzunehmen, genügt eine Zustimmung von 25%."}, {"id": 20, "type": "single", "cat": "W", "question": "Welche zwei Gewerkschaften gehören zu den größten in Deutschland?", "options": ["ADAC (Allgemeiner Deutscher Automobilclub) und TÜV (Technischer Überwachungsverein) als Berufsverbände", "IG Metall und ver.di", "DGB (Deutscher Gewerkschaftsbund) als Dachverband und BDA (Bundesvereinigung der Arbeitgeberverbände)", "DAK (Deutsche Angestellten-Krankenkasse) und AOK (Allgemeine Ortskrankenkasse) als Sozialversicherer"], "correct": 1, "explanation": "Die IG Metall und ver.di sind die zwei größten Einzelgewerkschaften in Deutschland. Die IG Metall vertritt Beschäftigte in der Metall- und Elektroindustrie, ver.di die Beschäftigten im Dienstleistungssektor. Beide sind Mitglied im DGB (Dachverband)."}, {"id": 21, "type": "single", "cat": "W", "question": "Welche zwei Hauptaufgaben hat eine Gewerkschaft?", "options": ["Steuern von den Arbeitnehmern einziehen und eigene arbeitsrechtliche Gesetze im Parlament erlassen", "Abschluss von Tarifverträgen und Vertretung gemeinsamer Arbeitnehmerinteressen", "Eigenständig neue Ausbildungsplätze schaffen und staatliche Berufsschulen im Auftrag des Staates betreiben", "Eigene Unternehmen gründen und deren Produkte im freien Wettbewerb an Verbraucher verkaufen"], "correct": 1, "explanation": "Die zwei Hauptaufgaben: 1) Tarifverträge mit Arbeitgeberverbänden aushandeln und abschließen (über Löhne, Arbeitszeiten, Urlaub) und 2) die gemeinsamen Interessen der Arbeitnehmer gegenüber Arbeitgebern und Politik vertreten."}, {"id": 22, "type": "single", "cat": "S", "question": "Unter welchen Voraussetzungen wird eine Jugend- und Auszubildendenvertretung (JAV) gewählt?", "options": ["In jedem Betrieb, der mindestens einen Auszubildenden beschäftigt, unabhängig von der Betriebsgröße", "In Betrieben mit mind. 5 Jugendlichen unter 18 oder Azubis unter 25, und nur wenn ein Betriebsrat besteht", "Ausschließlich in Betrieben mit mehr als 100 fest angestellten Mitarbeitern und einem eigenen Betriebsrat", "Nur in öffentlichen Betrieben und Behörden, nicht aber in privaten Handwerks- oder Industrieunternehmen"], "correct": 1, "explanation": "Eine JAV kann in Betrieben gewählt werden, die mindestens 5 Jugendliche unter 18 oder Auszubildende unter 25 beschäftigen. Wichtig: Es muss bereits ein Betriebsrat bestehen. Die JAV vertritt die besonderen Interessen der jungen Beschäftigten."}, {"id": 23, "type": "single", "cat": "S", "question": "Warum ist die private Altersvorsorge so wichtig?", "options": ["Weil die gesetzliche Rentenversicherung in Deutschland in jedem Fall eine pünktliche und ausreichende monatliche Zahlung für den gesamten Lebensunterhalt sicherstellt", "Um den Lebensstandard im Alter zu erhalten, da die gesetzliche Rente durch Arbeitslosigkeit, längere Ausbildung oder unterdurchschnittliche Verdienste geringer ausfallen kann", "Weil der deutsche Staat per Gesetz alle erwerbstätigen Bürger dazu verpflichtet, neben der gesetzlichen Rente zusätzlich eine private Altersvorsorge abzuschließen", "Weil man ab dem Erreichen der gesetzlichen Altersgrenze von 67 Jahren keinerlei finanzielle staatliche Unterstützung oder Sozialleistungen mehr erhält"], "correct": 1, "explanation": "Die gesetzliche Rente allein reicht oft nicht für den gewohnten Lebensstandard im Alter. Gründe: Arbeitslosigkeit, längere Ausbildungszeiten oder unterdurchschnittliche Verdienste führen zu weniger Rentenpunkten. Der demografische Wandel verschärft das Problem. Deshalb sind private Vorsorge (Riester, betriebliche Altersvorsorge, ETF-Sparpläne) wichtig."}, {"id": 24, "type": "single", "cat": "S", "question": "Nennen Sie zwei Ursachen für die Finanzierungsprobleme der Sozialversicherungen.", "options": ["Die Gehälter der Arbeitnehmer in Deutschland sind insgesamt zu hoch und die Urlaubstage viel zu zahlreich", "Weniger sozialversicherungspflichtige Arbeitnehmer und mehr Pflegebedürftige/längere Lebenserwartung durch medizinischen Fortschritt", "Die allgemeinen Steuersätze in Deutschland sind im internationalen Vergleich viel zu niedrig angesetzt", "Es gibt derzeit zu viele Auszubildende auf dem Arbeitsmarkt und gleichzeitig viel zu wenig Meisterbetriebe"], "correct": 1, "explanation": "Hauptursachen: 1) Weniger sozialversicherungspflichtig Beschäftigte durch Arbeitslosigkeit, Minijobs und demografischen Wandel. 2) Steigende Kosten durch mehr Pflegebedürftige, längere Lebenserwartung und teurere medizinische Behandlungen."}, {"id": 25, "type": "single", "cat": "W", "question": "Welche drei Gründe können zu einer fristlosen Kündigung durch den Arbeitgeber führen?", "options": ["Krankheit, Schwangerschaft und Urlaub", "Diebstahl, Geschäftsschädigung (Untreue) und Arbeitsverweigerung", "Verspätung, schlechte Laune und Überstunden", "Gewerkschaftsmitgliedschaft, Streik und Beschwerde"], "correct": 1, "explanation": "Gründe für eine fristlose Kündigung nach § 626 BGB: Diebstahl am Arbeitsplatz, Geschäftsschädigung/Untreue (z.B. Unterschlagung) und beharrliche Arbeitsverweigerung. Diese Gründe sind so schwerwiegend, dass dem Arbeitgeber eine Weiterbeschäftigung nicht zugemutet werden kann."}, {"id": 26, "type": "single", "cat": "W", "question": "Wie lange dauert die Probezeit beim Ausbildungsvertrag (mind. und max.)?", "options": ["1 bis 6 Monate", "1 bis 4 Monate", "3 bis 6 Monate", "2 bis 3 Monate"], "correct": 1, "explanation": "Die Probezeit im Ausbildungsverhältnis dauert mindestens 1 Monat und höchstens 4 Monate (§ 20 BBiG). In dieser Zeit können beide Seiten ohne Angabe von Gründen und ohne Frist schriftlich kündigen."}, {"id": 27, "type": "single", "cat": "W", "question": "Was versteht man unter einer Einzugsermächtigung (SEPA-Lastschrift)?", "options": ["Man überweist als Zahlungspflichtiger den fälligen Betrag selbständig und aktiv an den Zahlungsempfänger", "Der Zahlungspflichtige erteilt dem Zahlungsempfänger die Erlaubnis, Geld von seinem Konto abzubuchen", "Man hebt den benötigten Geldbetrag persönlich am Bankautomaten ab und bezahlt damit den Empfänger in bar", "Man bezahlt die offene Forderung mit einer Kreditkarte direkt beim Einkauf im Geschäft oder Onlineshop"], "correct": 1, "explanation": "Bei einer Einzugsermächtigung (SEPA-Lastschriftmandat) erlaubt der Zahlungspflichtige dem Empfänger, fällige Beträge direkt vom Bankkonto abzubuchen. Praktisch bei regelmäßigen Zahlungen wie Miete oder Versicherungen. Man kann einer Abbuchung innerhalb von 8 Wochen widersprechen."}, {"id": 28, "type": "single", "cat": "W", "question": "Aus welchen vier Teilen setzt sich die IBAN zusammen und wie viele Stellen hat sie in Deutschland?", "options": ["Bankleitzahl, Kontonummer, BIC-Code und persönliche PIN zusammen ergeben insgesamt 16 Stellen", "Ländercode, Prüfsumme mit Prüfziffer, Bankleitzahl und Kontonummer – 22 Stellen", "Vorname des Kontoinhabers, Nachname, Name der Bank und Kontonummer ergeben zusammen 20 Stellen", "BIC-Code, SWIFT-Kennung, Bankleitzahl und individuelle Kontonummer zusammen ergeben 24 Stellen"], "correct": 1, "explanation": "Die deutsche IBAN hat 22 Stellen: 1) Ländercode (z.B. DE), 2) Prüfsumme mit Prüfziffer (2 Ziffern), 3) Bankleitzahl (8 Ziffern) und 4) Kontonummer (10 Ziffern)."}, {"id": 29, "type": "single", "cat": "W", "question": "Bei welchen Anlässen richtet man einen Dauerauftrag ein?", "options": ["Bei einmaligen größeren Anschaffungen wie dem Kauf eines Autos oder einer neuen Heizungsanlage", "Bei wiederkehrenden und gleichbleibenden Zahlungen wie Miete, Flatrate oder Versicherungen", "Beim täglichen Einkauf im Supermarkt oder bei kleineren Besorgungen im Einzelhandel vor Ort", "Ausschließlich bei Zahlungen ins Ausland, die über das SEPA-Verfahren abgewickelt werden müssen"], "correct": 1, "explanation": "Ein Dauerauftrag eignet sich für regelmäßige Zahlungen in immer gleicher Höhe an denselben Empfänger, z.B. Miete, Handyvertrag, Versicherungsbeiträge oder Sparraten. Die Bank führt die Zahlung automatisch aus."}, {"id": 30, "type": "single", "cat": "W", "question": "Welche der folgenden sind bargeldlose Zahlungsmöglichkeiten?", "options": ["Ausschließlich Überweisung und Dauerauftrag zählen als bargeldlose Formen des Zahlungsverkehrs", "Überweisung, Dauerauftrag, Lastschrift, EC-Karte, Kreditkarte und Verrechnungsscheck", "Nur EC-Karte (Girocard) und Kreditkarte gelten als anerkannte bargeldlose Zahlungsmöglichkeiten", "Nur Bargeld und klassische Schecks sind für den regulären Zahlungsverkehr in Deutschland zugelassen"], "correct": 1, "explanation": "Bargeldlose Zahlungsmöglichkeiten: Überweisung, Dauerauftrag, Lastschrift/Einzugsermächtigung, EC-Karte/Girocard, Kreditkarte und Verrechnungsscheck. Auch PayPal, Apple Pay oder Google Pay zählen dazu."}, {"id": 31, "type": "single", "cat": "W", "question": "Womit haftet ein Einzelunternehmer?", "options": ["Ausschließlich mit dem im Handelsregister eingetragenen Firmenvermögen, nicht mit dem Privatvermögen", "Mit seinem gesamten Geschäfts- und Privatvermögen", "Nur bis zur Höhe des bei der Gründung eingezahlten Stammkapitals, das im Gesellschaftsvertrag festgelegt ist", "Der Unternehmer haftet persönlich gar nicht, da die gewerbliche Haftpflichtversicherung einspringt"], "correct": 1, "explanation": "Ein Einzelunternehmer haftet unbeschränkt und persönlich mit seinem gesamten Vermögen – Geschäfts- und Privatvermögen. Das unterscheidet ihn von Kapitalgesellschaften wie der GmbH, bei der die Haftung auf das Gesellschaftsvermögen beschränkt ist."}, {"id": 32, "type": "matching", "cat": "W", "question": "Ordnen Sie die Beschreibungen dem richtigen Begriff zu.", "pairs": [{"item": "Geldentwertung: Man bekommt weniger Ware für die gleiche Summe Geld", "match": "Inflation"}, {"item": "Rückgang des Preisniveaus: Die Nachfrage ist geringer als das Angebot", "match": "Deflation"}, {"item": "Die Kaufkraft des Geldes sinkt", "match": "Inflation"}, {"item": "Die Preise für Güter und Dienstleistungen fallen dauerhaft", "match": "Deflation"}], "matchOptions": ["Inflation", "Deflation"], "explanation": "Inflation = Geldentwertung: Preisniveau steigt, Kaufkraft sinkt. Deflation = das Gegenteil: Preisniveau sinkt dauerhaft, weil die Nachfrage geringer ist als das Angebot. Beides kann wirtschaftliche Probleme verursachen."}, {"id": 33, "type": "single", "cat": "W", "question": "Wie verhält sich die Nachfrage, wenn der Preis sinkt?", "options": ["Die Nachfrage sinkt ebenfalls", "Die Nachfrage nimmt zu", "Die Nachfrage bleibt gleich", "Die Nachfrage verschwindet"], "correct": 1, "explanation": "Nach dem Gesetz der Nachfrage gilt: Sinkt der Preis, steigt die nachgefragte Menge (und umgekehrt). Bei niedrigeren Preisen können sich mehr Menschen das Produkt leisten und bestehende Käufer kaufen mehr."}, {"id": 34, "type": "single", "cat": "W", "question": "Erhält ein Handwerker typischerweise einen Zeit- oder Leistungslohn?", "options": ["Leistungslohn (Akkord)", "Zeitlohn", "Nur Trinkgeld", "Provision"], "correct": 1, "explanation": "Handwerker erhalten typischerweise einen Zeitlohn (Stunden- oder Monatslohn). Handwerkliche Tätigkeiten sind sehr unterschiedlich und schwer messbar. Ein Leistungslohn (Akkord) würde zu Qualitätseinbußen führen."}, {"id": 35, "type": "single", "cat": "W", "question": "Welche Funktion hat ein Streik?", "options": ["Er ist ein gesetzlich festgelegter Feiertag, an dem alle Arbeitnehmer eines Betriebs frei bekommen", "Letztes Druckmittel der Arbeitnehmer, um ihre Interessen beim Arbeitgeber durchzusetzen", "Eine vom Arbeitgeber angeordnete Maßnahme, um die Gewerkschaft unter wirtschaftlichen Druck zu setzen", "Ein durch staatliche Behörden angeordneter vorübergehender Produktionsstopp bei Tarifkonflikten"], "correct": 1, "explanation": "Der Streik ist das letzte und stärkste Druckmittel der Arbeitnehmer in Tarifverhandlungen. Durch gemeinsame Arbeitsniederlegung soll der Arbeitgeber unter Druck gesetzt werden. Ein Streik ist nur zulässig, wenn die Friedenspflicht abgelaufen ist und eine Urabstimmung erfolgte."}, {"id": 36, "type": "single", "cat": "W", "question": "Welche Sozialpartner handeln den Tariflohn aus?", "options": ["Bundestag und Bundesrat verhandeln gemeinsam über die Höhe der Tariflöhne in allen Branchen", "Die Gewerkschaften und die Arbeitgeberverbände (Tarifpartner)", "Die einzelnen Arbeitnehmer verhandeln mit ihrem direkten Vorgesetzten individuell über das Gehalt", "Das Bundesministerium für Arbeit und Soziales legt die Tariflöhne per Verordnung verbindlich fest"], "correct": 1, "explanation": "Den Tariflohn handeln die Tarifpartner aus: Auf Arbeitnehmerseite die Gewerkschaften (z.B. IG Metall), auf Arbeitgeberseite die Arbeitgeberverbände (z.B. Gesamtmetall). Dies geschieht im Rahmen der Tarifautonomie (Art. 9 Abs. 3 GG)."}, {"id": 37, "type": "single", "cat": "S", "question": "Welche Bezüge erhält man bei Arbeitslosigkeit, wenn man zuvor länger als 2 Jahre sozialversicherungspflichtig beschäftigt war?", "options": ["Man erhält sofort Bürgergeld ohne vorherige Prüfung der bisherigen Beschäftigungsdauer oder Einzahlung", "Arbeitslosengeld I für Personen, die in den vergangenen 30 Monaten mind. 12 Monate sozialversicherungspflichtig beschäftigt waren", "Man erhält keinerlei Bezüge vom Staat, da bei Arbeitslosigkeit kein gesetzlicher Leistungsanspruch besteht", "Man erhält ausschließlich Kindergeld, sofern minderjährige Kinder im eigenen Haushalt leben"], "correct": 1, "explanation": "Wer in den vergangenen 30 Monaten vor der Arbeitslosmeldung mindestens 12 Monate sozialversicherungspflichtig beschäftigt war, hat Anspruch auf ALG I. Es beträgt ca. 60% (ohne Kinder) bzw. 67% (mit Kindern) des letzten Nettogehalts, bis zu 12 Monate. Danach kann Bürgergeld beantragt werden."}, {"id": 38, "type": "single", "cat": "W", "question": "Was versteht man unter Tarifautonomie?", "options": ["Der Staat legt die Löhne und Arbeitsbedingungen durch Gesetze und Verordnungen verbindlich für alle fest", "Tarifverträge werden ohne Beteiligung des Staates nur durch Arbeitgeberverbände und Gewerkschaften ausgehandelt", "Jeder einzelne Arbeitnehmer verhandelt vollständig individuell und ohne Gewerkschaft sein persönliches Gehalt", "Die Europäische Union bestimmt einheitliche Mindestlöhne, die für alle Mitgliedstaaten verbindlich gelten"], "correct": 1, "explanation": "Tarifautonomie bedeutet, dass Tarifverträge ausschließlich zwischen Arbeitgeberverbänden und Gewerkschaften ausgehandelt werden, ohne Einmischung des Staates. Dieses Recht ist im Grundgesetz verankert (Art. 9 Abs. 3 GG)."}, {"id": 39, "type": "single", "cat": "W", "question": "Was versteht man unter Kündigungsschutz?", "options": ["Durch den Kündigungsschutz kann ein Arbeitnehmer grundsätzlich unter keinen Umständen mehr gekündigt werden", "Erschwerung bzw. Ausschluss einer Kündigung des Arbeitsvertrags (nicht zu verwechseln mit besonderem Kündigungsschutz für Schwangere etc.)", "Ausschließlich Beamte im öffentlichen Dienst genießen nach deutschem Recht einen wirksamen Kündigungsschutz", "Der allgemeine Kündigungsschutz nach dem Arbeitsrecht gilt ausschließlich innerhalb der vereinbarten Probezeit"], "correct": 1, "explanation": "Kündigungsschutz bedeutet, dass eine Kündigung durch den Arbeitgeber erschwert oder unter bestimmten Umständen ausgeschlossen wird. Das KSchG gilt in Betrieben mit mehr als 10 Mitarbeitern nach 6 Monaten Betriebszugehörigkeit. Es gibt zusätzlich besonderen Kündigungsschutz für Schwangere, Schwerbehinderte und Betriebsratsmitglieder."}, {"id": 40, "type": "single", "cat": "S", "question": "Was ist das Petitionsrecht und wo ist es verankert?", "options": ["Das im Grundgesetz in Artikel 8 verankerte Recht auf Versammlungsfreiheit und die Teilnahme an öffentlichen Demonstrationen zu politischen und gesellschaftlichen Themen", "Das Recht, sich einzeln oder in Gemeinschaft schriftlich mit Bitten oder Beschwerden an die zuständigen Stellen und die Volksvertretung zu wenden – Artikel 17 GG", "Das Grundrecht auf freie Meinungsäußerung in Wort, Schrift und Bild, das in Artikel 5 des Grundgesetzes verankert ist und die Pressefreiheit miteinschließt", "Das Grundrecht auf körperliche Unversehrtheit und den Schutz der persönlichen Freiheit, das in Artikel 2 des Grundgesetzes festgeschrieben und garantiert ist"], "correct": 1, "explanation": "Das Petitionsrecht ist in Artikel 17 GG verankert. Es gibt jedermann das Recht, sich einzeln oder in Gemeinschaft schriftlich mit Bitten oder Beschwerden an die zuständigen Stellen und die Volksvertretung zu wenden. Man muss dafür weder volljährig noch Staatsbürger sein."}, {"id": 41, "type": "single", "cat": "W", "question": "Was sind typische Beispiele für eine einseitige Willenserklärung?", "options": ["Kaufvertrag und Mietvertrag", "Testament und Kündigung", "Eheschließung und Arbeitsvertrag", "Gesellschaftsvertrag und Darlehensvertrag"], "correct": 1, "explanation": "Einseitige Willenserklärungen erfordern nur die Erklärung einer Person: Testament, Kündigung, Mahnung, Widerruf. Im Gegensatz dazu brauchen Verträge die übereinstimmenden Willenserklärungen von mindestens zwei Parteien."}, {"id": 42, "type": "single", "cat": "S", "question": "Wo haben die Vereinten Nationen (UNO) ihren Hauptsitz?", "options": ["Genf (Schweiz)", "New York City (USA)", "Den Haag (Niederlande)", "Brüssel (Belgien)"], "correct": 1, "explanation": "Die UNO hat ihren Hauptsitz in New York City. Dort befinden sich die UN-Generalversammlung und der Sicherheitsrat. Weitere Standorte: Genf, Wien und Nairobi. Die UNO wurde 1945 gegründet und hat 193 Mitgliedstaaten."}, {"id": 43, "type": "single", "cat": "S", "question": "Wie viele Stimmen hat der Wahlzettel der Bundestagswahl und wofür sind sie?", "options": ["Jeder Wähler hat eine einzige Stimme, die ausschließlich für die bevorzugte Partei abgegeben wird", "Zwei Stimmen: Erststimme für den Wahlkreiskandidaten, Zweitstimme für die Partei (Landesliste)", "Drei separate Stimmen: jeweils eine für die Partei, einen Direktkandidaten und den Bundeskanzler", "Zwei Stimmen, die jedoch beide ausschließlich für die bevorzugte Partei und deren Landesliste gelten"], "correct": 1, "explanation": "Bei der Bundestagswahl hat jeder Wähler zwei Stimmen: Die Erststimme wählt einen Kandidaten direkt im Wahlkreis (Direktmandat). Die Zweitstimme wählt die Landesliste einer Partei und bestimmt die Sitzverteilung im Bundestag. Die Zweitstimme ist besonders wichtig für die Machtverhältnisse."}, {"id": 44, "type": "matching", "cat": "S", "question": "Ordnen Sie die Aussagen zu Massenmedien als Vorteil (Pro) oder Nachteil (Contra) ein.", "pairs": [{"item": "Weitläufige und schnelle Informationsverbreitung", "match": "Pro"}, {"item": "Suchtpotenzial (z.B. Smartphone-Sucht)", "match": "Contra"}, {"item": "Mediengesellschaft und demokratische Meinungsbildung", "match": "Pro"}, {"item": "Manipulation und Verbreitung von Fake News", "match": "Contra"}, {"item": "Gesellschaftliche Isolation durch übermäßigen Konsum", "match": "Contra"}], "matchOptions": ["Pro", "Contra"], "explanation": "Massenmedien haben Vorteile und Nachteile. Pro: Schnelle Informationsverbreitung, demokratische Meinungsbildung. Contra: Suchtpotenzial, Manipulationsgefahr durch Fake News, gesellschaftliche Isolation."}, {"id": 45, "type": "single", "cat": "S", "question": "Welche Funktionen haben Massenmedien in einer Demokratie?", "options": ["Massenmedien dienen in einer demokratischen Gesellschaft ausschließlich der Unterhaltung der Bevölkerung", "Information, Meinungsbildung, Kontrolle der Politik, Reaktion/Stimmungsbildung und gesellschaftliche Kritik", "Die einzige Funktion von Massenmedien besteht in der kommerziellen Werbung und Vermarktung von Produkten", "Massenmedien beschränken sich darauf, offizielle Nachrichten und Pressemitteilungen der Regierung zu verbreiten"], "correct": 1, "explanation": "Massenmedien erfüllen in einer Demokratie: Information, Meinungsbildung, Kontrolle (die vierte Gewalt), Reaktion/Stimmung und gesellschaftliche Kritik."}, {"id": 46, "type": "single", "cat": "W", "question": "Was versteht man unter Just-in-Time-Produktion?", "options": ["Die Produktion auf Vorrat für eine spätere Lieferung an die Kunden bei Bestellung aus dem Warenlager", "Direkte Anlieferung von Produkten zur Serienanfertigung ohne Zwischenlagerung, spart Lagerkosten", "Herstellung von Waren erst nach konkreter Kundenbestellung und individuellem Fertigungsauftrag", "Nachtschichtarbeit und durchgehender Dreischichtbetrieb für eine möglichst schnelle Gesamtproduktion"], "correct": 1, "explanation": "Just-in-Time (JIT) bedeutet, dass Zulieferer ihre Materialien genau dann liefern, wenn sie in der Produktion benötigt werden – ohne Zwischenlagerung. Das spart Lagerkosten. Im Saarland nutzt z.B. Ford in Saarlouis dieses Prinzip. Nachteil: Bei Lieferstörungen kann die Produktion stillstehen."}, {"id": 47, "type": "single", "cat": "S", "question": "Was ist das wichtigste Ziel der UNO heute?", "options": ["Förderung des weltweiten Freihandels durch den Abbau von Zöllen und internationalen Handelsschranken", "Friedenssicherung, Schutz der Menschenrechte und Umweltschutz", "Langfristige Bildung einer zentralen Weltregierung mit Gesetzgebungskompetenz für alle Mitgliedstaaten", "Ausschließlich die Koordination und Durchführung humanitärer Hilfsmaßnahmen in Krisengebieten weltweit"], "correct": 1, "explanation": "Die wichtigsten Ziele der UNO: Friedenssicherung und Kriegsverhütung, Schutz der Menschenrechte weltweit, internationale Zusammenarbeit bei Umweltschutz, Entwicklungshilfe, Gesundheit und Bildung."}, {"id": 48, "type": "single", "cat": "S", "question": "Wofür steht die Abkürzung CDU?", "options": ["Christliche Deutsche Union", "Christlich Demokratische Union", "Christlich Demokratische Umweltpartei", "Central Deutsche Union"], "correct": 1, "explanation": "CDU steht für Christlich Demokratische Union. Sie ist die größte konservative Partei und bildet mit der bayerischen CSU eine gemeinsame Bundestagsfraktion. Der aktuelle CDU-Vorsitzende und Bundeskanzler (2026) ist Friedrich Merz."}, {"id": 49, "type": "single", "cat": "W", "question": "Was versteht man unter Buchgeld im Bankenwesen?", "options": ["Bargeld, das an einem sicheren Ort wie einem Tresor oder einem Buch physisch aufbewahrt und versteckt wird", "Geld, das nur auf Bankkonten notiert ist und nicht als Bargeld existiert – das Gegenteil ist Bargeld", "Ein spezieller Geldbetrag, den man ausschließlich für den Kauf von Büchern und Lernmaterialien verwenden darf", "Eine eigene Sonderwährung, die nur innerhalb des Buchhandels als offizielles Zahlungsmittel akzeptiert wird"], "correct": 1, "explanation": "Buchgeld (Giralgeld) existiert nur als Gutschrift auf Bankkonten – es ist nicht anfassbar. Der größte Teil des Geldes in einer Volkswirtschaft ist Buchgeld, z.B. wenn der Arbeitgeber das Gehalt überweist."}, {"id": 50, "type": "single", "cat": "W", "question": "Welche vier Funktionen hat Geld?", "options": ["Sparen für die Zukunft, Verleihen gegen Zinsen, Tauschen im Alltag und Verschenken an andere Personen", "Wertmaßstab, Wertübertragungsmittel, Tauschmittel und gesetzliches Zahlungsmittel", "Drucken durch die Zentralbank, Prägen als Münzen, Verteilen an die Banken und Sammeln durch Sparer", "Kaufen von Waren und Gütern, Verkaufen von Dienstleistungen, Investieren und Spekulieren an der Börse"], "correct": 1, "explanation": "Geld hat vier Funktionen: 1) Wertmaßstab (Preise vergleichen), 2) Wertübertragungsmittel (Werte aufbewahren/übertragen), 3) Tauschmittel (Kauf/Verkauf erleichtern), 4) Gesetzliches Zahlungsmittel (muss als Zahlung akzeptiert werden)."}, {"id": 51, "type": "single", "cat": "S", "question": "Wie heißt der amtierende Bundespräsident (2026)?", "options": ["Joachim Gauck, der als parteiloser Bürgerrechtler 2012 zum Bundespräsidenten gewählt wurde", "Frank-Walter Steinmeier", "Christian Wulff, der von 2010 bis zu seinem Rücktritt 2012 das Amt des Bundespräsidenten innehatte", "Horst Köhler, der als ehemaliger IWF-Direktor 2004 zum Bundespräsidenten gewählt worden war"], "correct": 1, "explanation": "Frank-Walter Steinmeier (SPD) ist seit 2017 Bundespräsident, 2022 für eine zweite Amtszeit wiedergewählt. Er wird von der Bundesversammlung für 5 Jahre gewählt und hat vor allem repräsentative Aufgaben."}, {"id": 52, "type": "single", "cat": "S", "question": "Wer ist der amtierende Bundesfinanzminister (2026)?", "options": ["Christian Lindner (FDP)", "Lars Klingbeil (SPD)", "Olaf Scholz (SPD)", "Robert Habeck (Grüne)"], "correct": 1, "explanation": "Lars Klingbeil (SPD) ist seit Mai 2025 Bundesfinanzminister und Vizekanzler in der Regierung Merz. Sein Vorgänger Christian Lindner (FDP) war 2021–2024 Finanzminister in der Ampelkoalition."}, {"id": 53, "type": "single", "cat": "S", "question": "Welche Person gehört NICHT zur aktuellen saarländischen Landesregierung (2026)?", "options": ["Anke Rehlinger", "Reinhold Jost", "Tobias Hans", "Petra Berg"], "correct": 2, "explanation": "Tobias Hans (CDU) war 2018–2022 Ministerpräsident, gehört aber nicht mehr zur Regierung. Seit 2022 regiert die SPD unter Anke Rehlinger mit absoluter Mehrheit. Zur Regierung gehören u.a. Jürgen Barke, Christine Streichert-Clivot, Reinhold Jost und Petra Berg."}, {"id": 54, "type": "single", "cat": "S", "question": "Wie viele Landkreise hat das Saarland und wie heißt der Gemeindeverband der Landeshauptstadt?", "options": ["Insgesamt 4 Landkreise und der historische Stadtverband Saarbrücken als eigenständige Verwaltungseinheit", "5 Landkreise (St. Wendel, Neunkirchen, Merzig-Wadern, Saarlouis, Saarpfalz-Kreis) und der Regionalverband Saarbrücken", "6 Landkreise sowie die kreisfreie Landeshauptstadt Saarbrücken als eigenständige kommunale Verwaltungseinheit", "Lediglich 3 Landkreise und der Regierungsbezirk Saarbrücken als übergeordnete Verwaltungsebene"], "correct": 1, "explanation": "Das Saarland hat 5 Landkreise: St. Wendel, Neunkirchen, Merzig-Wadern, Saarlouis und den Saarpfalz-Kreis. Dazu kommt der Regionalverband Saarbrücken. Insgesamt hat das Saarland 52 Gemeinden."}, {"id": 55, "type": "single", "cat": "S", "question": "Was besagt der erste Artikel der Verfassung der BRD?", "options": ["Alle Menschen sind vor dem Gesetz gleich", "Die Würde des Menschen ist unantastbar", "Jeder hat das Recht auf freie Meinungsäußerung", "Die Bundesrepublik ist ein demokratischer Staat"], "correct": 1, "explanation": "Artikel 1 Abs. 1 GG: Die Würde des Menschen ist unantastbar. Sie zu achten und zu schützen ist Verpflichtung aller staatlichen Gewalt. Dieser Artikel ist durch die Ewigkeitsklausel (Art. 79 Abs. 3 GG) vor Änderungen geschützt."}, {"id": 56, "type": "single", "cat": "S", "question": "Auf welchen Rechten basiert der erste Artikel der Verfassung?", "options": ["Auf dem Handelsgesetzbuch (HGB), das die Grundlage für alle wirtschaftlichen Rechte und Pflichten bildet", "Auf den Menschenrechten (Grundrechte, Artikel 1–19 GG)", "Auf dem Strafgesetzbuch (StGB), das die strafrechtlichen Grundlagen für den Schutz der Person definiert", "Auf dem internationalen Völkerrecht, das zwischenstaatliche Abkommen und Menschenrechte regelt"], "correct": 1, "explanation": "Art. 1 GG basiert auf den Menschenrechten, konkretisiert in den Grundrechten (Art. 1–19 GG). Dazu gehören z.B. freie Entfaltung (Art. 2), Gleichheit (Art. 3), Glaubensfreiheit (Art. 4), Meinungsfreiheit (Art. 5)."}, {"id": 57, "type": "single", "cat": "S", "question": "Von wem wurde das Grundgesetz verfasst und wann trat es in Kraft?", "options": ["Vom Deutschen Bundestag in seiner ersten regulären Sitzungsperiode nach dem Krieg im Jahre 1955", "Vom Parlamentarischen Rat, in Kraft getreten am 23. Mai 1949", "Von der damaligen Bundesregierung unter Konrad Adenauer im Zuge der Wiedervereinigung im Jahr 1990", "Von den alliierten Siegermächten nach dem Ende des Zweiten Weltkriegs im Jahr 1945"], "correct": 1, "explanation": "Das Grundgesetz wurde vom Parlamentarischen Rat erarbeitet (ab September 1948 in Bonn, Präsident: Konrad Adenauer). Es trat am 23. Mai 1949 in Kraft und ist seitdem die Verfassung der BRD."}, {"id": 58, "type": "single", "cat": "W", "question": "Welche zwei allgemeinen Formen des Arbeitsschutzes gibt es?", "options": ["Allgemeiner Kündigungsschutz für Arbeitnehmer und gesetzlicher Mutterschutz für werdende Mütter", "Technischer Arbeitsschutz und sozialer Arbeitsschutz", "Betrieblicher Gesundheitsschutz für die Belegschaft und allgemeiner Umweltschutz in der Produktion", "Vorbeugender Brandschutz in Betriebsgebäuden und der gesetzlich vorgeschriebene betriebliche Datenschutz"], "correct": 1, "explanation": "1) Technischer Arbeitsschutz: Schutz vor Gefahren durch Sicherheitsvorschriften, Schutzausrüstung, Unfallverhütung. 2) Sozialer Arbeitsschutz: Arbeitszeitregelungen, Mutterschutz, Jugendarbeitsschutz, Kündigungsschutz und Mitbestimmung."}, {"id": 59, "type": "single", "cat": "W", "question": "Was versteht man unter Globalisierung?", "options": ["Die vollständige politische Zusammenlegung aller souveränen Länder der Welt zu einem einzigen Staat", "Die zunehmende weltweite Verflechtung von Technik, Handel, Kultur, Umwelt, Arbeitsmarkt und Informationstechnik", "Ausschließlich der grenzüberschreitende internationale Warenhandel zwischen verschiedenen Volkswirtschaften", "Die weltweite Ausbreitung und zunehmende Verfügbarkeit des Internets als Kommunikationsmedium"], "correct": 1, "explanation": "Globalisierung beschreibt die zunehmende weltweite Verflechtung in allen Bereichen: Wirtschaft, Technik, Kultur, Umwelt, Arbeitsmärkte und Politik. Treiber sind das Internet, günstiger Transport, Freihandelsabkommen und internationale Unternehmen."}, {"id": 60, "type": "matching", "cat": "W", "question": "Ordnen Sie die Aspekte der Globalisierung als Vorteil (Pro) oder Nachteil (Contra) ein.", "pairs": [{"item": "Internationale Verknüpfungen und Zusammenarbeit", "match": "Pro"}, {"item": "Alle Waren sind jederzeit weltweit verfügbar", "match": "Pro"}, {"item": "Höhere Umweltschäden durch weltweiten Transport", "match": "Contra"}, {"item": "Ausbeutung in Billiglohnländern", "match": "Contra"}, {"item": "Schnellere Ausbreitung von Pandemien", "match": "Contra"}], "matchOptions": ["Pro", "Contra"], "explanation": "Pro: Internationale Verknüpfungen, weltweite Warenverfügbarkeit, kultureller Austausch. Contra: Umweltschäden, Ausbeutung in Billiglohnländern, schnellere Pandemieausbreitung, Abhängigkeit von globalen Lieferketten."}, {"id": 61, "type": "single", "cat": "S", "question": "Was ist eine Bürgerinitiative?", "options": ["Eine auf kommunaler Ebene offiziell gegründete und beim Wahlleiter registrierte eigenständige kleine politische Partei mit eigenen Kandidaten für den Gemeinderat", "Eine Interessenvereinigung, die sich aus der Gesellschaft bildet und versucht, Einfluss auf die öffentliche Meinung und staatliche Einrichtungen zu nehmen", "Ein von der kommunalen Stadtverwaltung eingerichtetes offizielles staatliches Amt, an das sich Bürger mit Beschwerden und Anliegen wenden können", "Eine fest eingerichtete Abteilung innerhalb der jeweiligen kommunalen Stadtverwaltung oder des Landratsamts, die für Bürgerbeteiligung und Eingaben zuständig ist"], "correct": 1, "explanation": "Eine Bürgerinitiative ist ein freiwilliger Zusammenschluss von Bürgern, der sich für ein bestimmtes Anliegen einsetzt und versucht, Einfluss auf die öffentliche Meinung, Parteien oder staatliche Einrichtungen zu nehmen."}, {"id": 62, "type": "matching", "cat": "W", "question": "Ordnen Sie die Steuern als direkt oder indirekt ein.", "pairs": [{"item": "Einkommensteuer", "match": "Direkt"}, {"item": "Kfz-Steuer", "match": "Direkt"}, {"item": "Mineralölsteuer", "match": "Indirekt"}, {"item": "Mehrwertsteuer", "match": "Indirekt"}, {"item": "Kaffeesteuer", "match": "Indirekt"}, {"item": "Lohnsteuer", "match": "Direkt"}], "matchOptions": ["Direkt", "Indirekt"], "explanation": "Direkte Steuern: Der Steuerzahler wird unmittelbar belastet (Einkommensteuer, Lohnsteuer, Kfz-Steuer). Indirekte Steuern: Die Steuerlast wird über den Kaufpreis an den Endverbraucher weitergegeben (Mehrwertsteuer, Mineralölsteuer, Kaffeesteuer)."}, {"id": 63, "type": "matching", "cat": "W", "question": "Ordnen Sie die Beschreibungen dem richtigen Begriff zu.", "pairs": [{"item": "Einnahmen des Staates ohne spezielle Gegenleistung", "match": "Steuern"}, {"item": "Abgabe für eine bestimmte staatliche Leistung (z.B. Passgebühr)", "match": "Gebühren"}, {"item": "Abgabe für spezielle Gegenleistung, auch wenn nicht gewünscht (z.B. Sozialversicherung)", "match": "Beiträge"}, {"item": "Abgaben beim Import von Waren über Staatsgrenzen", "match": "Zölle"}], "matchOptions": ["Steuern", "Gebühren", "Beiträge", "Zölle"], "explanation": "Steuern: Abgaben ohne Gegenleistung. Gebühren: Entgelt für eine konkrete staatliche Leistung. Beiträge: Abgaben für bereitgestellte Leistungen (auch wenn nicht genutzt). Zölle: Abgaben auf importierte Waren."}, {"id": 64, "type": "single", "cat": "W", "question": "Was ist eine juristische Person?", "options": ["Jeder Mensch, der ein juristisches Studium abgeschlossen hat und über einen entsprechenden Abschluss verfügt", "Ein Rechtsgebilde, dem Rechtsfähigkeit zuerkannt wird (z.B. GmbH, AG, e.V.)", "Ein Richter, der am Bundesverfassungsgericht in Karlsruhe tätig ist und dort Urteile zu Grundrechten fällt", "Ein zugelassener Rechtsanwalt oder ein vereidigter Notar mit Befugnis zur Beurkundung von Rechtsgeschäften"], "correct": 1, "explanation": "Eine juristische Person ist kein Mensch, sondern ein Rechtsgebilde mit eigener Rechtsfähigkeit. Sie kann Verträge schließen, klagen und verklagt werden. Beispiele: GmbH, AG, eingetragener Verein (e.V.). Das Gegenteil sind natürliche Personen (Menschen)."}, {"id": 65, "type": "single", "cat": "W", "question": "Wer sind natürliche Personen?", "options": ["Nur Menschen mit deutscher Staatsbürgerschaft", "Alle lebenden Menschen (von der Geburt bis zum Tod)", "Nur geschäftsfähige Erwachsene", "Firmen und Vereine"], "correct": 1, "explanation": "Natürliche Personen sind alle lebenden Menschen – von der Geburt bis zum Tod. Jeder Mensch ist rechtsfähig ab der Geburt, d.h. Träger von Rechten und Pflichten (z.B. kann ein Baby erben)."}, {"id": 66, "type": "single", "cat": "W", "question": "Welche allgemeine Aufgabe hat ein Betriebsrat?", "options": ["Er leitet den gesamten Betrieb eigenverantwortlich und trifft alle unternehmerischen Entscheidungen allein", "Interessenvertretung der Arbeitnehmer in einem Betrieb gegenüber dem Arbeitgeber", "Er ist zuständig für die eigenständige Einstellung und Auswahl neuer Mitarbeiter in allen Abteilungen", "Er hat die Befugnis, Mitarbeitern bei Fehlverhalten eigenständig die ordentliche Kündigung auszusprechen"], "correct": 1, "explanation": "Der Betriebsrat ist die gewählte Interessenvertretung der Arbeitnehmer. Er hat Mitbestimmungsrechte in sozialen Angelegenheiten (Arbeitszeiten, Urlaub), personellen Angelegenheiten (Einstellungen, Kündigungen) und wirtschaftlichen Angelegenheiten."}, {"id": 67, "type": "single", "cat": "W", "question": "Was kann ein Verkäufer tun, wenn der Käufer in Zahlungsverzug gerät?", "options": ["Sofort die Polizei rufen und eine Strafanzeige wegen Betrugs gegen den säumigen Käufer erstatten", "Zunächst Zahlungserinnerungen (Mahnungen) versenden, dann ein gerichtliches Mahnverfahren einleiten", "Die bereits gelieferte und übergebene Ware eigenmächtig und ohne Gerichtsurteil vom Käufer zurücknehmen", "Den Käufer direkt und ohne jede vorherige Mahnung vor dem zuständigen Zivilgericht auf Zahlung verklagen"], "correct": 1, "explanation": "Stufenweises Vorgehen: 1) Zahlungserinnerungen/Mahnungen versenden. 2) Falls weiterhin keine Zahlung: gerichtliches Mahnverfahren beim Amtsgericht einleiten. Erst nach Mahnbescheid und ggf. Vollstreckungsbescheid kann zwangsweise vollstreckt werden."}, {"id": 68, "type": "single", "cat": "W", "question": "Was ist ein einseitiges Rechtsgeschäft?", "options": ["Ein Vertrag, der durch die übereinstimmenden Willenserklärungen von mindestens zwei beteiligten Parteien zustande kommt", "Ein Rechtsgeschäft, bei dem die Willenserklärung nur von einer Person kommt (z.B. Kündigung, Widerruf)", "Ein besonderes Geschäft, das ausschließlich in den Vormittagsstunden innerhalb der Geschäftszeiten abgeschlossen werden darf", "Ein formloser Geschäftsabschluss ohne schriftlichen Vertrag, der nur auf mündlicher Vereinbarung basiert"], "correct": 1, "explanation": "Ein einseitiges Rechtsgeschäft entsteht durch die Willenserklärung nur einer Person. Beispiele: Kündigung, Testament, Widerruf, Mahnung, Anfechtung. Verträge hingegen brauchen übereinstimmende Willenserklärungen von mindestens zwei Parteien."}, {"id": 69, "type": "matching", "cat": "W", "question": "Ordnen Sie die Merkmale dem richtigen Lohntyp zu.", "pairs": [{"item": "Entlohnung nach der Arbeitszeit", "match": "Zeitlohn"}, {"item": "Berechnung nach erbrachter Leistung/Menge (Akkord)", "match": "Leistungslohn"}, {"item": "Weniger körperliche Überforderung", "match": "Zeitlohn"}, {"item": "Hoher Leistungsanreiz, aber evtl. Qualitätsminderung", "match": "Leistungslohn"}, {"item": "Geringerer Maschinenverschleiß", "match": "Zeitlohn"}], "matchOptions": ["Zeitlohn", "Leistungslohn"], "explanation": "Zeitlohn: Bezahlung nach Arbeitsstunden, weniger Stress, geringerer Verschleiß, aber weniger Leistungsanreiz. Leistungslohn (Akkord): Bezahlung nach Menge/Leistung, hoher Anreiz, aber evtl. Qualitätsminderung und körperliche Belastung."}, {"id": 70, "type": "single", "cat": "W", "question": "Warum senkt der Staat in einer Wirtschaftskrise die Zinsen auf Kredite?", "options": ["Um die Banken und großen Finanzinstitute durch günstigere Konditionen wirtschaftlich noch profitabler zu machen", "Um die Wirtschaft anzukurbeln: Niedrige Zinsen fördern Geldausgaben und Investitionen, was zu mehr Steuereinnahmen führt", "Um die Inflation gezielt und dauerhaft zu erhöhen und damit die bestehende Staatsverschuldung zu entwerten", "Weil die Banken in der Wirtschaftskrise über keinerlei eigene Geldreserven mehr für die Kreditvergabe verfügen"], "correct": 1, "explanation": "Niedrigere Zinsen machen Kredite günstiger und sollen Unternehmen zu Investitionen und Bürger zu Konsum anregen. Mehr Geldausgaben kurbeln die Wirtschaft an und führen zu höheren Steuereinnahmen. Die EZB steuert den Leitzins als wichtiges Instrument der Geldpolitik."}, {"id": 71, "type": "matching", "cat": "S", "question": "Ordnen Sie die Beschreibungen dem richtigen Wahlrecht zu.", "pairs": [{"item": "Das Recht, selbst wählen zu gehen", "match": "Aktiv"}, {"item": "Das Recht, sich zur Wahl aufstellen zu lassen und gewählt zu werden", "match": "Passiv"}], "matchOptions": ["Aktiv", "Passiv"], "explanation": "Aktives Wahlrecht = selbst wählen gehen (ab 18 bei Bundestagswahlen). Passives Wahlrecht = sich als Kandidat aufstellen lassen. Merkhilfe: Aktiv = man tut etwas (wählen), passiv = man lässt etwas mit sich geschehen (gewählt werden)."}, {"id": 72, "type": "single", "cat": "S", "question": "Welche fünf Wahlrechtsgrundsätze gelten bei einer Wahl in Deutschland?", "options": ["Öffentlich, direkt, frei, gleich, allgemein", "Allgemein, frei, gleich, geheim und unmittelbar", "Geheim, indirekt, frei, gleich, allgemein", "Allgemein, frei, ungleich, geheim, mittelbar"], "correct": 1, "explanation": "Die fünf Wahlrechtsgrundsätze (Art. 38 GG): 1) Allgemein: Alle Staatsbürger ab 18. 2) Frei: Kein Druck, keine Wahlpflicht. 3) Gleich: Jede Stimme zählt gleich. 4) Geheim: Stimmabgabe geheim. 5) Unmittelbar: Direkte Wahl eines Abgeordneten oder über Liste."}, {"id": 73, "type": "single", "cat": "S", "question": "Welche Staatsform hatte die Weimarer Republik und wann bestand sie?", "options": ["Eine konstitutionelle Monarchie unter Kaiser Wilhelm II. im Zeitraum von 1900 bis zum Ende 1918", "Parlamentarische Demokratie, 1918–1933", "Eine totalitäre Diktatur unter nationalsozialistischer Führung im gesamten Zeitraum von 1919 bis 1945", "Eine föderale Bundesrepublik nach dem Vorbild der heutigen BRD, bestehend seit dem Jahr 1949 bis heute"], "correct": 1, "explanation": "Die Weimarer Republik war eine parlamentarische Demokratie (1918–1933). Sie wurde nach dem Ende des Ersten Weltkriegs ausgerufen und endete mit der Machtergreifung der Nationalsozialisten 1933. Benannt nach Weimar, wo die Nationalversammlung 1919 die Verfassung beschloss."}, {"id": 74, "type": "single", "cat": "S", "question": "Was ist der Unterschied zwischen Menschenrechten und Bürgerrechten?", "options": ["Es gibt in der Praxis keinen rechtlich relevanten Unterschied zwischen Menschen- und Bürgerrechten", "Menschenrechte gelten für alle Personen in einem Staat; Bürgerrechte gelten nur für die Staatsbürger (vgl. Art. 116 GG)", "Menschenrechte gelten ausschließlich im Ausland und finden im deutschen Inland keinerlei Anwendung", "Bürgerrechte gelten als universelle Rechte weltweit für alle Menschen ungeachtet ihrer Staatsangehörigkeit"], "correct": 1, "explanation": "Menschenrechte gelten für alle Menschen unabhängig von der Staatsangehörigkeit (z.B. Menschenwürde, Meinungsfreiheit). Bürgerrechte gelten nur für deutsche Staatsbürger i.S.d. Art. 116 GG (z.B. Wahlrecht, Versammlungsfreiheit, Berufsfreiheit)."}, {"id": 75, "type": "single", "cat": "W", "question": "Was ist ein Angebotsoligopol? Nennen Sie ein Beispiel.", "options": ["Viele verschiedene Anbieter auf dem Markt und nur ein einziger Nachfrager mit großer Verhandlungsmacht", "Wenige Anbieter und viele Nachfrager (z.B. Strom-, Mobilfunk- oder Mineralölmarkt)", "Genau ein einzelner Anbieter und ein einzelner Nachfrager stehen sich auf dem Markt direkt gegenüber", "Sehr viele Anbieter und gleichzeitig sehr viele Nachfrager konkurrieren auf einem vollkommenen Markt"], "correct": 1, "explanation": "Ein Angebotsoligopol: Wenige Anbieter stehen vielen Nachfragern gegenüber. Die Anbieter haben erhebliche Marktmacht. Beispiele: Mobilfunkmarkt (Telekom, Vodafone, Telefónica), Strommarkt, Mineralölmarkt (Shell, BP, TotalEnergies)."}, {"id": 76, "type": "single", "cat": "W", "question": "Was ist eine soziale Marktwirtschaft?", "options": ["Eine Wirtschaftsordnung, in der der Staat die gesamte Produktion und Verteilung zentral plant und steuert", "In der sozialen Marktwirtschaft greift der Staat bei Bedarf regulierend in die Preispolitik ein, um soziale Gerechtigkeit zu sichern", "Eine vollständig freie Wirtschaftsordnung, in der der Staat keinerlei regulierende Eingriffe vornimmt", "Eine Wirtschaftsform, die ausschließlich für sozialversicherungspflichtig beschäftigte Arbeitnehmer konzipiert ist"], "correct": 1, "explanation": "In der sozialen Marktwirtschaft gilt grundsätzlich freier Markt, aber der Staat greift regulierend ein für soziale Gerechtigkeit. Instrumente: Mindestlohn, Sozialversicherungen, Kartellgesetze, Verbraucherschutz. Deutschland hat seit 1949 dieses System."}, {"id": 77, "type": "single", "cat": "S", "question": "Wie viele Mitglieder hat der Bundesrat insgesamt?", "options": ["16 Mitglieder", "69 Mitglieder", "598 Mitglieder", "100 Mitglieder"], "correct": 1, "explanation": "Der Bundesrat hat 69 Mitglieder, entsandt von den 16 Landesregierungen. Die Stimmenzahl pro Land hängt von der Einwohnerzahl ab: mindestens 3, maximal 6 Stimmen."}, {"id": 78, "type": "single", "cat": "S", "question": "Wie viele Stimmen hat das Saarland im Bundesrat?", "options": ["6 Stimmen", "4 Stimmen", "3 Stimmen", "5 Stimmen"], "correct": 2, "explanation": "Das Saarland hat als kleinstes Flächenland (knapp 1 Mio. Einwohner) die Mindestzahl von 3 Stimmen im Bundesrat. Zum Vergleich: NRW, Bayern, Baden-Württemberg und Niedersachsen haben jeweils 6 Stimmen."}, {"id": 79, "type": "single", "cat": "S", "question": "Was versteht man unter der Richtlinienkompetenz des Bundeskanzlers?", "options": ["Der Bundeskanzler hat laut Grundgesetz das alleinige Recht, eigenständig und ohne jede Beteiligung des Parlaments neue Bundesgesetze zu erlassen", "Der Kanzler bestimmt die Richtlinien der Politik und trägt die Verantwortung; jeder Minister leitet seinen Bereich selbständig innerhalb dieser Richtlinien", "Der Bundeskanzler kann jeden seiner Bundesminister jederzeit und ohne Angabe eines sachlichen oder politischen Grundes sofort aus dem Amt entlassen", "Der Bundeskanzler bestimmt allein die Richter am Bundesverfassungsgericht in Karlsruhe und ernennt sie ohne Zustimmung von Bundestag oder Bundesrat"], "correct": 1, "explanation": "Die Richtlinienkompetenz (Art. 65 GG): Der Bundeskanzler gibt die Grundzüge der Regierungspolitik vor. Innerhalb dieser Richtlinien leitet jeder Bundesminister seinen Geschäftsbereich selbständig und unter eigener Verantwortung (Ressortprinzip)."}, {"id": 80, "type": "single", "cat": "S", "question": "Warum ist der Grad der Geschäftsfähigkeit abhängig vom Lebensalter?", "options": ["Weil ältere Menschen aufgrund ihres längeren Berufslebens in der Regel über deutlich mehr angespartes Geld und Vermögenswerte verfügen als jüngere Personen", "Der Gesetzgeber geht davon aus, dass mit steigendem Alter der Reifegrad zunimmt und junge Menschen die Konsequenzen ihres Handelns weniger gut einschätzen können", "Weil Kinder und Jugendliche nach dem geltenden deutschen Bankrecht keine eigenen Girokonten bei Kreditinstituten eröffnen und selbständig führen dürfen", "Weil das Grundgesetz der Bundesrepublik Deutschland in einem eigenen Artikel ausdrücklich und detailliert die genauen Altersgrenzen der Geschäftsfähigkeit vorschreibt"], "correct": 1, "explanation": "Die Abstufung schützt junge Menschen: Mit steigendem Alter wächst die geistige Reife und die Fähigkeit, Konsequenzen einzuschätzen. Deshalb: geschäftsunfähig unter 7, beschränkt geschäftsfähig 7–17, voll geschäftsfähig ab 18."}, {"id": 81, "type": "single", "cat": "W", "question": "Wann muss ein Verkäufer liefern, wenn keine Lieferzeit vereinbart wurde?", "options": ["Innerhalb von 14 Tagen", "Sofort (unverzüglich)", "Innerhalb von 30 Tagen", "Innerhalb von 6 Wochen"], "correct": 1, "explanation": "Wenn keine Lieferzeit vereinbart wurde, muss sofort (unverzüglich) geliefert werden (§ 271 BGB)."}, {"id": 82, "type": "single", "cat": "W", "question": "Auf welche drei Arten können Willenserklärungen abgegeben werden?", "options": ["Willenserklärungen können ausschließlich in schriftlicher Form rechtswirksam abgegeben und empfangen werden", "Schriftlich, mündlich und durch schlüssiges Handeln (z.B. Handzeichen bei Auktion, Einsteigen ins Taxi)", "Willenserklärungen sind nur gültig, wenn sie sowohl mündlich als auch gleichzeitig schriftlich abgegeben werden", "In der heutigen Zeit können Willenserklärungen ausschließlich auf digitalem Weg per E-Mail abgegeben werden"], "correct": 1, "explanation": "Willenserklärungen können abgegeben werden: 1) Schriftlich (z.B. Vertrag), 2) Mündlich (z.B. Zusage), 3) Durch schlüssiges (konkludentes) Handeln – z.B. Handzeichen bei Auktion, Einsteigen ins Taxi, Waren aufs Kassenband legen."}, {"id": 83, "type": "single", "cat": "W", "question": "Was versteht man unter Ausbildung im dualen System?", "options": ["Die Ausbildung findet ausschließlich in der Berufsschule statt, ohne praktische Tätigkeit in einem Betrieb", "Ausbildung an zwei Lernorten: Berufsschule (Theorie) und Ausbildungsbetrieb (Praxis)", "Die Ausbildung erfolgt gleichzeitig an einer Universität und in einem kooperierenden Wirtschaftsunternehmen", "Man absolviert zwei verschiedene vollständige Berufsausbildungen parallel und gleichzeitig in einem Betrieb"], "correct": 1, "explanation": "Duales System = zwei Lernorte: Berufsschule (Theorie: Fachtheorie, WiSo, Deutsch) und Ausbildungsbetrieb (Praxis: z.B. Rohre verlegen, Heizungen installieren). International als German Model bekannt."}, {"id": 84, "type": "single", "cat": "W", "question": "Bei welcher Organisation muss der Ausbildungsvertrag für Anlagenmechaniker SHK eingereicht werden?", "options": ["Industrie- und Handelskammer (IHK)", "Handwerkskammer (HWK)", "Arbeitsagentur", "Berufsschule"], "correct": 1, "explanation": "Der Ausbildungsvertrag muss bei der Handwerkskammer (HWK) eingetragen werden, da Anlagenmechaniker SHK ein Handwerksberuf ist. Die HWK ist auch für die Prüfungen zuständig."}, {"id": 85, "type": "single", "cat": "W", "question": "Welche Angaben muss ein Berufsausbildungsvertrag mindestens enthalten?", "options": ["Für den Ausbildungsvertrag genügen lediglich der vollständige Name des Auszubildenden und seine Unterschrift", "Beginn und Dauer, Personalien, Vergütung, Urlaubstage, Unterschriften und Dauer der Probezeit", "Im Vertrag müssen nur die Höhe der monatlichen Vergütung und die Bezeichnung des Ausbildungsberufs stehen", "Es müssen nur die Dauer der Probezeit und der jährliche Urlaubsanspruch in Tagen angegeben werden"], "correct": 1, "explanation": "Laut § 11 BBiG muss der Vertrag enthalten: Beginn und Dauer, Personalien beider Seiten, Vergütung, Urlaubstage, Probezeit (1–4 Monate), Unterschriften (bei Minderjährigen auch der Erziehungsberechtigten) und Ausbildungsplan."}, {"id": 86, "type": "matching", "cat": "W", "question": "Ordnen Sie die Kündigungsregeln nach der Probezeit richtig zu.", "pairs": [{"item": "Jederzeit schriftlich mit 4-Wochen-Frist kündigen", "match": "Azubi"}, {"item": "Nur aus wichtigem Grund (fristlos), mit vorheriger Mahnung kündigen", "match": "Ausbilder"}], "matchOptions": ["Azubi", "Ausbilder"], "explanation": "Nach der Probezeit: Der Azubi kann jederzeit mit 4 Wochen Frist schriftlich kündigen. Der Ausbilder kann nur aus wichtigem Grund fristlos kündigen (z.B. Diebstahl), in der Regel nach vorheriger Mahnung."}, {"id": 87, "type": "single", "cat": "W", "question": "Was sind Haustürgeschäfte und nennen Sie ein Beispiel?", "options": ["Geschäfte, die in den offiziellen Geschäftsräumen eines Einzelhandelsunternehmens oder Ladengeschäfts stattfinden", "Verträge, die außerhalb von Geschäftsräumen geschlossen werden (z.B. Vertreterbesuch, Kaffeefahrt) – mit 14-tägigem Widerrufsrecht", "Online-Bestellungen, die über das Internet in einem Onlineshop aufgegeben und elektronisch abgewickelt werden", "Geschäfte, die nur unmittelbar an der Haustür stattfinden, nicht aber auf Messen oder bei Kaffeefahrten"], "correct": 1, "explanation": "Haustürgeschäfte (Außergeschäftsraumverträge) sind Verträge außerhalb üblicher Geschäftsräume: Vertreterbesuch, Kaffeefahrten, Weinproben. Der Verbraucher hat ein 14-tägiges Widerrufsrecht, da er oft überrumpelt wird."}, {"id": 88, "type": "matching", "cat": "W", "question": "Ordnen Sie die Beschreibungen dem richtigen juristischen Rechtsmittel zu.", "pairs": [{"item": "Neue Beweise können vorgebracht werden, das Urteil ist noch offen", "match": "Berufung"}, {"item": "Rechtliche Überprüfung des gefällten Urteils (nur Rechtsfragen)", "match": "Revision"}], "matchOptions": ["Berufung", "Revision"], "explanation": "Berufung: Höhere Instanz prüft den Fall komplett neu, neue Beweise möglich, neues Urteil. Revision: Noch höhere Instanz prüft nur die korrekte Rechtsanwendung (keine neuen Beweise). Reihenfolge: Amtsgericht → Landgericht (Berufung) → OLG (Revision)."}, {"id": 89, "type": "single", "cat": "W", "question": "Wo muss der Erlass eines Mahnbescheids beantragt werden?", "options": ["Beim Bundestag", "Beim zuständigen Amtsgericht", "Bei der Polizei", "Bei der Handwerkskammer"], "correct": 1, "explanation": "Ein Mahnbescheid wird beim zuständigen Amtsgericht beantragt. Es ist der erste Schritt im gerichtlichen Mahnverfahren. Der Antrag kann auch online gestellt werden. Der Schuldner hat 2 Wochen für Widerspruch."}, {"id": 90, "type": "matching", "cat": "W", "question": "Ordnen Sie die Eigenschaften dem richtigen Schecktyp zu.", "pairs": [{"item": "Kann nur in bar ausgezahlt werden", "match": "Barscheck"}, {"item": "Kann nur dem Kontoinhaber (Empfänger) gutgeschrieben werden", "match": "Verrechnungsscheck"}], "matchOptions": ["Barscheck", "Verrechnungsscheck"], "explanation": "Barscheck: Kann bei der Bank bar ausgezahlt werden. Verrechnungsscheck: Trägt den Vermerk 'Nur zur Verrechnung' und wird nur dem Konto des Empfängers gutgeschrieben – sicherer bei Verlust."}, {"id": 91, "type": "single", "cat": "W", "question": "Wie wirkt sich Inflation auf die Bürger aus?", "options": ["Die Löhne und Gehälter der Arbeitnehmer steigen automatisch mit der Inflationsrate und alle profitieren davon", "Preiserhöhungen, Entwertung von Ersparnissen und Flucht in Sachwerte (Edelmetalle, Immobilien)", "Bei Inflation wird alles billiger, die Kaufkraft steigt und die Bürger können sich mehr Waren leisten", "Von der Inflation sind ausschließlich Unternehmen betroffen, nicht aber die privaten Bürger und Verbraucher"], "correct": 1, "explanation": "Inflation trifft Bürger: 1) Preiserhöhungen bei gleichem Einkommen. 2) Entwertung von Ersparnissen. 3) Flucht in Sachwerte (Edelmetalle, Immobilien, Uhren). Besonders hart für Menschen mit festem Einkommen wie Rentner."}, {"id": 92, "type": "single", "cat": "W", "question": "Durch welche drei Möglichkeiten kann ein Arbeitsverhältnis beendet werden?", "options": ["Ein Arbeitsverhältnis kann ausschließlich durch eine einseitige Kündigung des Arbeitgebers beendet werden", "Zeitablauf (befristeter Vertrag), Kündigung und Aufhebungsvertrag", "Das Arbeitsverhältnis kann nur durch den Arbeitgeber einseitig beendet werden, niemals durch den Arbeitnehmer", "Die häufigsten Beendigungsgründe sind Krankheit des Arbeitnehmers, Eintritt in die Rente und Umzug in eine andere Stadt"], "correct": 1, "explanation": "Drei Arten: 1) Zeitablauf bei befristeten Verträgen. 2) Kündigung (ordentlich mit Frist oder außerordentlich/fristlos). 3) Aufhebungsvertrag (einvernehmliche Beendigung durch beide Seiten)."}, {"id": 93, "type": "single", "cat": "W", "question": "Was versteht man unter dem Begriff Markt?", "options": ["Ein fest errichtetes Gebäude mit vielen einzelnen Geschäften und Verkaufsständen, z.B. ein Einkaufszentrum", "Auf dem Markt treffen Käufer (Nachfrager) und Verkäufer (Anbieter) aufeinander und handeln einen Preis aus", "Ausschließlich ein traditioneller Wochenmarkt, auf dem frisches Obst, Gemüse und regionale Produkte verkauft werden", "Ein im Internet betriebener Online-Shop, über den Waren und Dienstleistungen digital angeboten werden"], "correct": 1, "explanation": "Ein Markt ist jeder Ort – auch virtuell – an dem Käufer (Nachfrager) und Verkäufer (Anbieter) aufeinandertreffen und einen Preis aushandeln. Es gibt Güter-, Arbeits-, Kapital- und Immobilienmärkte."}, {"id": 94, "type": "matching", "cat": "W", "question": "Ordnen Sie die Beispiele der richtigen Bedürfnisart zu.", "pairs": [{"item": "Unterkunft, Essen und Trinken, Kleidung", "match": "Existenzbedürfnisse"}, {"item": "Motoryacht, Sportwagen, teurer Schmuck", "match": "Luxusbedürfnisse"}, {"item": "Theater, Museum, Kino", "match": "Kulturbedürfnisse"}], "matchOptions": ["Existenzbedürfnisse", "Kulturbedürfnisse", "Luxusbedürfnisse"], "explanation": "Existenzbedürfnisse sichern das Überleben: Nahrung, Kleidung, Wohnung. Kulturbedürfnisse dienen der geistigen Entfaltung: Theater, Museum, Bildung. Luxusbedürfnisse gehen weit über das Notwendige: Yacht, Sportwagen, teurer Schmuck."}, {"id": 95, "type": "single", "cat": "W", "question": "Was sind freie Güter? Nennen Sie Beispiele.", "options": ["Güter, die man im Einzelhandel oder im Supermarkt kostenlos und ohne Bezahlung mit nach Hause nehmen kann", "Güter, die unbegrenzt vorhanden und kostenlos sind, z.B. Meerwasser, Sonnenlicht und Luft", "Güter, die nur innerhalb einer freien Marktwirtschaft existieren und dort gehandelt werden können", "Güter, die ohne Verpackung und ohne Markenbezeichnung verkauft werden, sogenannte No-Name-Produkte"], "correct": 1, "explanation": "Freie Güter sind unbegrenzt vorhanden und kostenlos: Meerwasser, Sonnenlicht, Luft, Sand in der Wüste. Das Gegenteil sind wirtschaftliche (knappe) Güter mit einem Preis. Durch Umweltverschmutzung werden manche freien Güter zunehmend knapp."}, {"id": 96, "type": "matching", "cat": "S", "question": "Ordnen Sie die Beispiele dem richtigen Medientyp zu.", "pairs": [{"item": "Zeitschriften", "match": "Printmedien"}, {"item": "Bücher", "match": "Printmedien"}, {"item": "Flyer", "match": "Printmedien"}, {"item": "Smartphone", "match": "Elektronische Medien"}, {"item": "TV und Radio", "match": "Elektronische Medien"}, {"item": "USB-Stick", "match": "Elektronische Medien"}], "matchOptions": ["Printmedien", "Elektronische Medien"], "explanation": "Printmedien = gedruckt: Zeitschriften, Bücher, Flyer. Elektronische Medien = elektronische Technik: Smartphone, TV, Radio, USB-Stick. Die Grenzen verschwimmen (z.B. E-Books)."}, {"id": 97, "type": "single", "cat": "W", "question": "Welches sind die drei volkswirtschaftlichen Produktionsfaktoren?", "options": ["Energie, Arbeit, Rohstoffe", "Arbeit, Boden und Kapital", "Maschinen, Geld und Mitarbeiter", "Import, Export und Konsum"], "correct": 1, "explanation": "Die drei Produktionsfaktoren nach Adam Smith: 1) Arbeit (menschliche Leistung), 2) Boden (natürliche Ressourcen, Grundstücke), 3) Kapital (Maschinen, Werkzeuge, Investitionsgeld)."}, {"id": 98, "type": "matching", "cat": "W", "question": "Ordnen Sie die Konjunkturphasen in die richtige Reihenfolge.", "pairs": [{"item": "Aufschwung (steigende Produktion, sinkende Arbeitslosigkeit)", "match": "Phase 1"}, {"it
