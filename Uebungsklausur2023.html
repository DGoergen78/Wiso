<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  .name-input-wrap { margin-bottom: 28px; }

  .btn-admin { display: block; margin: 0 auto; padding: 10px 28px; background: transparent; color: #475569; border: 1px dashed #334155; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }

  .admin-badge { display: inline-block; background: #f59e0b; color: #0f172a; font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

  .hints-box { margin-top: 44px; padding: 20px 24px; background: #1e293b; border-radius: 14px; text-align: left; }
  .hints-box .label { font-size: 13px; font-weight: 700; color: #a78bfa; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; }
  .hints-box ul { list-style: none; font-size: 13px; color: #94a3b8; line-height: 2; }
  .hints-box ul li::before { content: "•"; color: #6366f1; margin-right: 8px; }

  .progress-wrap { margin-bottom: 28px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 13px; color: #64748b; margin-bottom: 6px; }
  .progress-info .stats { display: flex; gap: 14px; }
  .progress-info .correct { color: #22c55e; }
  .progress-info .wrong { color: #ef4444; }
  .progress-bar { height: 5px; background: #1e293b; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a78bfa); border-radius: 3px; transition: width 0.4s ease; }

  .question-wrap { animation: slideIn 0.35s ease; }
  .question-num { color: #818cf8; font-weight: 700; margin-right: 8px; }
  .question-text { font-size: 17px; font-weight: 600; line-height: 1.55; color: #f1f5f9; margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 13px 18px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; font-family: inherit; transition: all 0.2s; line-height: 1.45; }
  .option-btn:hover:not(:disabled) { background: #334155; border-color: #818cf8; }

  .option-btn .letter { font-weight: 700; color: #818cf8; margin-right: 10px; }
  .option-btn.is-correct { background: rgba(34,197,94,0.13); border-color: #22c55e; color: #86efac; }
  .option-btn.is-correct .letter { color: #22c55e; }
  .option-btn.is-wrong { background: rgba(239,68,68,0.13); border-color: #ef4444; color: #fca5a5; }

  .match-item { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; transition: all 0.3s; }
  .match-item.is-correct { background: rgba(34,197,94,0.08); border-color: #22c55e; }
  .match-item.is-wrong { background: rgba(239,68,68,0.08); border-color: #ef4444; }
  .match-item .text { font-size: 14px; color: #e2e8f0; margin-bottom: 10px; line-height: 1.5; }
  .match-item .correction { font-size: 12px; color: #86efac; margin-top: 8px; }
  .match-btns { display: flex; gap: 7px; flex-wrap: wrap; }
  .match-btn { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-family: inherit; cursor: pointer; border: 1px solid #334155; background: #0f172a; color: #94a3b8; transition: all 0.2s; }
  .match-btn:disabled { cursor: default; }
  .match-btn.selected { background: #6366f1; color: #fff; border-color: transparent; font-weight: 600; }
  .match-btn.selected-correct { background: #22c55e; color: #fff; border-color: transparent; font-weight: 600; }
  .match-btn.selected-wrong { background: #ef4444; color: #fff; border-color: transparent; font-weight: 600; }
  .btn-check { margin-top: 18px; padding: 12px 30px; background: #334155; color: #64748b; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: not-allowed; transition: all 0.2s; }
  .btn-check.active { background: #6366f1; color: #fff; cursor: pointer; }
  .btn-check.active:hover { background: #818cf8; }

  .explanation { margin-top: 22px; padding: 16px 20px; border-radius: 12px; border-left: 4px solid; animation: fadeIn 0.3s ease; }
  .explanation.correct { background: rgba(34,197,94,0.07); border-color: #22c55e; }
  .explanation.wrong { background: rgba(239,68,68,0.07); border-color: #ef4444; }
  .explanation .verdict { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; }
  .explanation.correct .verdict { color: #22c55e; }
  .explanation.wrong .verdict { color: #ef4444; }
  .explanation .expl-text { font-size: 14px; color: #cbd5e1; line-height: 1.65; }

  .next-row { text-align: right; margin-top: 20px; }
  .btn-next { padding: 12px 32px; background: #6366f1; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s; }
  .btn-next:hover { background: #818cf8; }

  .result-screen { text-align: center; animation: fadeIn 0.5s ease; }
  .result-screen .emoji { font-size: 60px; margin-bottom: 12px; }
  .result-screen h1 { font-size: 26px; font-weight: 800; color: #f1f5f9; margin-bottom: 10px; }
  .result-screen .pct { font-size: 52px; font-weight: 800; margin-bottom: 4px; }
  .result-screen .pct.pass { color: #22c55e; }
  .result-screen .pct.fail { color: #ef4444; }
  .result-screen .count { font-size: 15px; color: #94a3b8; margin-bottom: 6px; }
  .result-screen .grade { font-size: 20px; font-weight: 700; color: #a78bfa; margin-bottom: 24px; }
  .result-section-title { font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 14px; text-align: left; font-weight: 700; }
  .result-item { padding: 12px 16px; margin-bottom: 7px; border-radius: 10px; text-align: left; border-left: 3px solid; }
  .result-item.c { background: rgba(34,197,94,0.06); border-color: #22c55e; }
  .result-item.w { background: rgba(239,68,68,0.06); border-color: #ef4444; }
  .result-item .q-text { font-size: 13px; color: #e2e8f0; line-height: 1.4; }
  .result-item .q-num { color: #818cf8; font-weight: 700; }
  .result-item .q-verdict { font-size: 11px; margin-top: 4px; font-weight: 600; }
  .result-item.c .q-verdict { color: #86efac; }
  .result-item.w .q-verdict { color: #fca5a5; }

  .leaderboard { margin-top: 4px; margin-bottom: 24px; text-align: left; }
  .leaderboard-title { font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .leaderboard-title span { font-size: 18px; }
  .lb-loading { font-size: 13px; color: #64748b; padding: 20px; text-align: center; }
  .lb-error { font-size: 13px; color: #94a3b8; padding: 16px; text-align: center; background: #1e293b; border-radius: 10px; }
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px; text-align: left; border-bottom: 1px solid #1e293b; font-weight: 700; }
  .lb-table td { font-size: 14px; color: #e2e8f0; padding: 10px 12px; border-bottom: 1px solid #1e293b; }
  .lb-rank { font-weight: 800; color: #818cf8; min-width: 32px; display: inline-block; }
  .lb-rank.gold { color: #fbbf24; }
  .lb-rank.silver { color: #94a3b8; }
  .lb-rank.bronze { color: #d97706; }
  .lb-medal { margin-right: 4px; }
  .lb-name { font-weight: 600; }
  .lb-pct { font-weight: 700; }
  .lb-pct.good { color: #22c55e; }
  .lb-pct.ok { color: #fbbf24; }
  .lb-pct.bad { color: #ef4444; }
  .lb-note { color: #94a3b8; font-size: 13px; }
  .lb-datum { color: #64748b; font-size: 12px; }
  .save-status { font-size: 13px; color: #64748b; margin-bottom: 16px; text-align: center; }
  .save-status.success { color: #22c55e; }
  .save-status.error { color: #ef4444; }



  .tabs { display: flex; gap: 0; margin-bottom: 20px; background: #1e293b; border-radius: 10px; overflow: hidden; }
  .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: #64748b; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s; }
  .tab-btn.active { background: #334155; color: #f1f5f9; }
  .tab-btn:hover:not(.active) { color: #94a3b8; }

  .btn-restart { padding: 14px 40px; background: linear-gradient(135deg, #6366f1, #a78bfa); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 28px; transition: transform 0.2s; }
  .btn-restart:hover { transform: scale(1.05); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #334155; border-top-color: #818cf8; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
</style>

<div class="container" id="app"></div>

<script>
var SHEET_URL = "https://script.google.com/macros/s/AKfycbzfUqLHUvWHtohFxLoWHd50LHlD1HW5dN_NncsyebgHfyXvzP89BTwM8-Lz5YfAzo1tPg/exec";
var ADMIN_TEST_COUNT = 3;

var QUESTIONS = [
  { id:1, type:"single", question:'Was versteht man unter „Just-in-Time"-Produktion?', options:["Schlanke Produktion","Zulieferung ohne Zwischenlagerung","Schlanke Unternehmensführung","Arbeitnehmer arbeiten, wann sie wollen","Auslagerung von Produktionsstätten"], correct:1, explanation:"Just-in-Time = Materialien werden genau dann geliefert, wenn sie benötigt werden – ohne Zwischenlagerung." },
  { id:2, type:"single", question:'Was bedeutet die Abkürzung „ver.di"?', options:["Vereinte Dienstleistungsgewerkschaft","Verdienstordnung für Ingenieure","Verein Deutscher Ingenieure","Verbraucher Dienstleistungsgewerkschaft","Vertreter der Deutschen Industriegewerkschaft"], correct:0, explanation:'ver.di = Vereinte Dienstleistungsgewerkschaft, eine der größten Einzelgewerkschaften der Welt.' },
  { id:3, type:"single", question:"Die unbeschränkte Geschäftsfähigkeit beginnt mit …", options:["18 Jahren.","der Geburt.","25 Jahren.","21 Jahren.","7 Jahren."], correct:0, explanation:"Mit 18 Jahren wird man unbeschränkt geschäftsfähig (§ 2 BGB)." },
  { id:4, type:"single", question:"Welcher Sozialversicherungszweig zahlt nur der Arbeitgeber?", options:["Pflegeversicherung","Krankenversicherung","Unfallversicherung","Arbeitslosenversicherung","Rentenversicherung"], correct:2, explanation:"Die Unfallversicherung (Berufsgenossenschaft) wird allein vom Arbeitgeber finanziert." },
  { id:5, type:"single", question:"Welcher Begriff entspricht der richterlichen Gewalt?", options:["Initiative","Exekutive","Legislative","Alternative","Judikative"], correct:4, explanation:"Judikative = richterliche Gewalt. Legislative = gesetzgebend, Exekutive = ausführend." },
  { id:6, type:"single", question:"Das Grundrecht, sich mit Bitten und Beschwerden an Volksvertreter zu wenden, heißt …", options:["Asylrecht.","Recht auf Freizügigkeit.","Recht auf freie Entfaltung der Persönlichkeit.","Diskretionsrecht.","Petitionsrecht."], correct:4, explanation:"Petitionsrecht (Art. 17 GG) = Recht auf Bitten und Beschwerden an die Volksvertretung." },
  { id:7, type:"single", question:'Welche Person ist eine „juristische Person"?', options:["Verfassungsrichterin","Rechtsanwalt","Staatsanwalt","Fred Feuerstein GmbH","Polizeioberkommissar"], correct:3, explanation:"Juristische Person = Rechtsgebilde wie GmbH, AG, Verein." },
  { id:8, type:"single", question:"Unter einem Nachfrage-Monopol versteht man …", options:["Markt mit einem Anbieter und vielen Nachfragern.","Markt zwischen Südpol und Nordpol.","Markt mit vielen Anbietern und einem Nachfrager.","Abkürzung für Monopolykäufer.","Markt mit einigen Anbietern und vielen Nachfragern."], correct:2, explanation:"Nachfragemonopol (Monopson) = ein Nachfrager, viele Anbieter." },
  { id:9, type:"single", question:"Wer ist der saarländische Minister für Inneres, Bauen und Sport (2026)?", options:["Reinhold Jost","Tobias Hans","Anke Rehlinger","Uwe Conradt","Peter Strobel"], correct:0, explanation:"Reinhold Jost (SPD) ist seit April 2022 Minister für Inneres, Bauen und Sport im Saarland." },
  { id:10, type:"single", question:"Wo muss der Ausbildungsvertrag (Anlagenmechaniker SHK) eingereicht werden?", options:["Industrie- und Handelskammer","Gewerbeaufsichtsamt","Handwerkskammer","Gesetzliche Krankenversicherung","Berufsgenossenschaft"], correct:2, explanation:"Handwerksberuf = Ausbildungsvertrag bei der Handwerkskammer (HWK)." },
  { id:11, type:"single", question:"Welches Gesetz regelt Ausbildungszeit, Vergütung, Urlaub und Probezeit?", options:["Jugendschutzgesetz","Betriebsverfassungsgesetz","Grundgesetz","Jugendarbeitsschutzgesetz","Berufsbildungsgesetz"], correct:4, explanation:"Das Berufsbildungsgesetz (BBiG) regelt die Rahmenbedingungen der dualen Berufsausbildung." },
  { id:12, type:"single", question:"Wer wurde 2022 Thronfolger nach Queen Elizabeth II?", options:["König Charles I.","König Charles III.","König Charles II.","König Charles V.","König Charles IV."], correct:1, explanation:"Prinz Charles wurde als König Charles III. gekrönt." },
  { id:13, type:"single", question:"Was versteht man unter Tarifautonomie?", options:["Sozialpartner handeln ohne staatliche Einmischung Tarifverträge aus.","Während der Laufzeit dürfen Arbeitskampfmaßnahmen stattfinden.","Arbeitnehmer und Arbeitgeber werden ausgeschlossen.","Nur mit Staatszustimmung darf ein Tarifvertrag geschlossen werden.","Die Löhne steigen stetig."], correct:0, explanation:"Tarifautonomie (Art. 9 Abs. 3 GG) = eigenständige Tarifverhandlungen ohne Staat." },
  { id:14, type:"single", question:"Was sind Bürgerinitiativen?", options:["Interessenvereinigungen","Politische Parteien","Soziale Netzwerke","Religiöse Sekten","Saarländische Nachbarschaftshilfe"], correct:0, explanation:"Bürgerinitiativen = Zusammenschlüsse für ein gemeinsames Anliegen." },
  { id:15, type:"single", question:"Welches Gremium hat 1948 das Grundgesetz ausgearbeitet?", options:["Bundesverfassungsgericht","Deutscher Bundestag","Kontrollrat","Bundeskanzler und Bundespräsident","Parlamentarischer Rat"], correct:4, explanation:"Der Parlamentarische Rat (Präsident: Adenauer) erarbeitete 1948/49 das Grundgesetz." },
  { id:16, type:"single", question:"Welches sind die drei volkswirtschaftlichen Produktionsfaktoren?", options:["Energie, Arbeit, Rohstoffe","Kapital, Rohstoffe, Arbeit","Arbeit, Kapital, Organisation","Arbeit, Boden, Energie","Arbeit, Boden, Kapital"], correct:4, explanation:"Klassische Produktionsfaktoren: Arbeit, Boden (Natur), Kapital." },
  { id:17, type:"single", question:"Was ist das duale Berufsausbildungssystem?", options:["Ministerium und Berufsschulen verantwortlich.","System der Abfallentsorgung.","Ausbildung dauert immer zweieinhalb Jahre.","Markt mit zwei Anbietern und Nachfragern.","Ausbildung an zwei Lernorten: Betrieb und Berufsschule."], correct:4, explanation:"Dual = zwei Lernorte: Betrieb (Praxis) + Berufsschule (Theorie)." },
  { id:18, type:"single", question:"Was ist der Generationenvertrag?", options:["Rentenzahlungen werden bei Generationenwechsel neu geregelt.","Jüngere sichern regelmäßige Rentenerhöhung.","Beiträge werden angesammelt und im Alter ausgezahlt.","Erwerbstätige finanzieren mit Beiträgen die Renten der Ruheständler.","Rentenzahlungen werden verzinst angelegt."], correct:3, explanation:"Generationenvertrag = Umlageverfahren: Erwerbstätige finanzieren die aktuellen Renten." },
  { id:19, type:"single", question:"Was ist Föderalismus?", options:["Zusammenlegung von Rheinland-Pfalz und Saarland","Parlamentarisches System","Dreiteilung der Staatsgewalt","Fördern sozialer Projekte","Eigenstaatlichkeit der Länder innerhalb eines Bundesstaates"], correct:4, explanation:"Föderalismus = Bundesländer haben eigene Verfassung, Regierung und Gesetzgebung." },
  { id:20, type:"single", question:"Wann können politische Parteien verboten werden?", options:["Wenn sie unbequem werden.","Wenn sie für direkte Demokratie werben.","Wenn sie die freiheitlich-demokratische Grundordnung gefährden.","Wenn sie Finanzierung nicht offenlegen.","Wenn sie unter 5 % bleiben."], correct:2, explanation:"Art. 21 Abs. 2 GG: Parteien können verboten werden, wenn sie die fdGO gefährden." },
  { id:21, type:"single", question:"Welches ist ein existenzielles Bedürfnis?", options:["Neuestes Smartphone","Nahrung und Kleidung","Schickes Restaurant","Markenkleidung","Meister-Fortbildung"], correct:1, explanation:"Existenzbedürfnisse sichern das Überleben: Nahrung, Kleidung, Wohnung." },
  { id:22, type:"single", question:"Was ist Datenschutz?", options:["Sichere Datenträger","Überwachung durch Behörden","Schutz vor unerlaubter Verwendung persönlicher Daten","Datenspeicherung gegen Missbrauch","Daten an Dritte weiterleiten"], correct:2, explanation:"Datenschutz = Recht auf informationelle Selbstbestimmung (DSGVO)." },
  { id:23, type:"single", question:'Wie wird „Markt" richtig definiert?', options:["Arbeitsmarkt für Anlagenmechaniker.","Ort zum Pressfittings-Kauf.","Ort, an dem Nachfrage und Angebot regelmäßig aufeinander treffen.","Betriebe bieten Güter an.","Reguliert sich nur über das Angebot."], correct:2, explanation:"Markt = Ort (auch virtuell), an dem Angebot und Nachfrage aufeinander treffen." },
  { id:24, type:"single", question:"Staat plant Produktion, Preise und Kosten zentral. Welche Wirtschaftsform?", options:["Planwirtschaft","Soziale Marktwirtschaft","Angebot-Nachfrage-Wirtschaft","Kartellwirtschaft","Freie Marktwirtschaft"], correct:0, explanation:"Planwirtschaft = Staat plant alles zentral." },
  { id:25, type:"single", question:"Wo stehen die Grundrechte?", options:["Im BGB","Im Strafgesetzbuch","Im Grundgesetz","Im Handelsgesetzbuch","Im Grundrechtsgesetzbuch"], correct:2, explanation:"Grundrechte = Artikel 1–19 des Grundgesetzes (GG)." },
  { id:26, type:"single", question:"Was sagt das GG über die Familie?", options:["Kein übergeordneter Stellenwert.","Großfamilien zahlen keine Steuern.","Freibad-Vergünstigungen.","Ehe und Familie unter besonderem Schutz der staatlichen Ordnung.","Nur Familien dürfen Kinder erziehen."], correct:3, explanation:"Art. 6 Abs. 1 GG: Ehe und Familie stehen unter besonderem Schutz." },
  { id:27, type:"single", question:"Welche Aussage über Bedürfnisse ist richtig?", options:["Bleiben stets gleich.","Kosten immer Geld.","Ändern sich und werden durch Werbung beeinflusst.","Entwicklungsländer haben keine.","Durch Haushaltsbuch immer befriedigt."], correct:2, explanation:"Bedürfnisse wandeln sich durch Werbung, Trends und technischen Fortschritt." },
  { id:28, type:"single", question:"Welche Steuer ist eine direkte Steuer?", options:["Tabaksteuer","Einkommensteuer","Mehrwertsteuer","Energiesteuer","Schaumweinsteuer"], correct:1, explanation:"Direkte Steuer = Steuerschuldner und Steuerträger identisch." },
  { id:29, type:"single", question:"Grundgedanke der Gewaltenteilung?", options:["Staatsgewalt vom Volk, nicht teilbar.","Polizei und Justiz teilen Strafgewalt.","Richter verurteilen ohne Verfahren.","Parlament, Regierung, Gerichte kontrollieren sich gegenseitig.","Nur Exekutive und Judikative getrennt."], correct:3, explanation:"Legislative, Exekutive, Judikative sind getrennt und kontrollieren sich gegenseitig." },
  { id:30, type:"single", question:"Was bedeutet Demokratie?", options:["Herrschaft des Einzelnen","Volksherrschaft","Herrschaft der Industrie","Herrschaft einer Partei","Monarchie"], correct:1, explanation:"Griechisch: demos (Volk) + kratein (herrschen) = Volksherrschaft." },
  { id:31, type:"single", question:"Welche Konjunktur-Erläuterung ist NICHT richtig?", options:["Rezession = Tiefstand","Boom = Hochkonjunktur","Expansion = Aufschwung","Rezession = Abschwung","Depression = Tiefstand"], correct:0, explanation:"Rezession = Abschwung (nicht Tiefstand!). Tiefstand = Depression." },
  { id:32, type:"single", question:"Welche Aufzählung enthält nur Verbrauchssteuern?", options:["Einkommensteuer, Kfz-Steuer, Körperschaftsteuer","Gewerbesteuer, Schaumweinsteuer, Lohnsteuer","Kaffeesteuer, Erbschaftsteuer, Grundsteuer","Getränkesteuer, Zinsabschlagsteuer, Einkommensteuer","Tabaksteuer, Biersteuer, Mineralölsteuer"], correct:4, explanation:"Verbrauchssteuern = auf den Verbrauch bestimmter Waren erhoben." },
  { id:33, type:"single", question:"Welche Aufzählung enthält nur einseitige Rechtsgeschäfte?", options:["Schuldanerkenntnis, Mietvertrag, Leihvertrag","Kündigung, Mietvertrag, Testament","Kündigung, Testament, Mahnung","Pachtvertrag, Testament, Mahnung","Leihvertrag, Mahnung, Erbvertrag"], correct:2, explanation:"Einseitig = eine Willenserklärung: Kündigung, Testament, Mahnung." },
  { id:34, type:"single", question:"Bester Schutz gegen Arbeitslosigkeit?", options:["Gewerkschaft","Führerschein","Partei","Zweite Ausbildung","Weiterbildung im eigenen Beruf"], correct:4, explanation:"Berufliche Weiterbildung erhöht Flexibilität = bester Schutz." },
  { id:35, type:"single", question:"Warum ist der 3. Oktober Nationalfeiertag?", options:["Mauerfall","Wiedervereinigung","Auflösung der Sowjetunion","NATO-Aufnahme","Ende des 2. Weltkriegs"], correct:1, explanation:"3. Oktober 1990 = Deutsche Wiedervereinigung. Mauerfall = 9. November 1989." },
  { id:36, type:"matching", question:"Ordnen Sie die Beispiele der Wirtschaftsform zu (FMW / SMW / ZPW).", pairs:[{item:"Kartellgesetze gegen Monopolbildung",match:"SMW"},{item:"Nur die billigsten Arbeitskräfte haben eine Chance",match:"FMW"},{item:"Schutz der wirtschaftlich Schwachen",match:"SMW"},{item:"Gesamter Wirtschaftsablauf staatlich geplant",match:"ZPW"},{item:"Freies Unternehmertum nicht zugelassen",match:"ZPW"},{item:"Vollkommene Konkurrenz zwischen Erzeuger und Verbraucher",match:"FMW"}], matchOptions:["FMW","SMW","ZPW"], explanation:"FMW = keine Eingriffe, SMW = Markt + Sozialschutz, ZPW = Staat plant alles." },
  { id:37, type:"single", question:"Warum hängt Geschäftsfähigkeit vom Alter ab?", options:["Eltern haften bis 18.","Eigenverantwortliches Handeln braucht Einsichtsfähigkeit und Alter.","GG entzieht Minderjährigen Vertragsrecht.","Erst ab 18 darf man ein Konto eröffnen."], correct:1, explanation:"Geistige Reife wächst mit dem Alter, daher die Abstufung zum Schutz junger Menschen." },
  { id:38, type:"matching", question:"Ordnen Sie die Begriffe den Erklärungen zu.", pairs:[{item:"Der Staat hilft Bürgern in Not.",match:"Sozialstaat"},{item:"Das Volk regiert sich selbst durch Wahlen.",match:"Demokratie"},{item:"Zusammenleben durch Recht und Gesetz geregelt.",match:"Rechtsstaat"}], matchOptions:["Demokratie","Rechtsstaat","Sozialstaat"], explanation:"Sozialstaat = Schwächenschutz, Demokratie = Volksherrschaft, Rechtsstaat = Bindung an Gesetz." },
  { id:39, type:"single", question:"Welche Koalition regiert seit 2025 auf Bundesebene?", options:["SPD, Grüne, FDP (Ampel)","CDU/CSU und SPD (Schwarz-Rot)","CDU/CSU und Grüne","SPD und Grüne"], correct:1, explanation:"Seit 2025: CDU/CSU + SPD unter Kanzler Friedrich Merz (CDU)." },
  { id:40, type:"matching", question:"Ordnen Sie zu: Beiträge, Steuern, Gebühren oder Zölle.", pairs:[{item:"Ausstellung eines Führerscheins",match:"Gebühren"},{item:"Hallenbad-Nutzung",match:"Gebühren"},{item:"Arbeitgeberanteil Sozialversicherung",match:"Beiträge"},{item:"Zahlung nach Kfz-Zulassung",match:"Steuern"},{item:"Entgelt bei Warenimport an der Grenze",match:"Zölle"}], matchOptions:["Beiträge","Steuern","Gebühren","Zölle"], explanation:"Gebühren = Gegenleistung, Beiträge = Sozialversicherung, Steuern = ohne Gegenleistung, Zölle = Import." },
  { id:41, type:"single", question:"Was bedeutet die 5 %-Sperrklausel?", options:["Halbe Sitze unter 5 %.","Verhindert Einzug kleiner Parteien, um Zersplitterung zu vermeiden.","Parteien unter 5 % werden verboten.","Gilt nur bei Landtagswahlen."], correct:1, explanation:"5 %-Hürde verhindert Parlamentszersplitterung – Lehre aus Weimar." },
  { id:42, type:"matching", question:'Lückentext: „Ein Bürgerrecht ist ein gesetzliches [1], das ein [2] seinen [3] zugesteht. In einer [4] gehört das [5] dazu. Es ist ein [6]."', pairs:[{item:"Lücke 1: gesetzliches ___",match:"Recht"},{item:"Lücke 2: das ein ___",match:"Staat"},{item:"Lücke 3: seinen ___",match:"Bürgern"},{item:"Lücke 4: in einer ___",match:"Demokratie"},{item:"Lücke 5: das ___",match:"Wahlrecht"},{item:"Lücke 6: ist ein ___",match:"Grundrecht"}], matchOptions:["Recht","Staat","Bürgern","Demokratie","Wahlrecht","Grundrecht"], explanation:'Lösung: Recht, Staat, Bürgern, Demokratie, Wahlrecht, Grundrecht.' },
  { id:43, type:"single", question:"Aktives und passives Wahlrecht – was stimmt?", options:["Aktiv = wählen; Passiv = gewählt werden.","Aktiv = gewählt werden; Passiv = wählen.","Aktiv = Wahlpflicht; Passiv = freiwillig.","Beide bedeuten dasselbe."], correct:0, explanation:"Aktiv = selbst wählen. Passiv = sich zur Wahl stellen / gewählt werden." },
  { id:44, type:"single", question:"Wer ist 2026 Bundeskanzler?", options:["Olaf Scholz (SPD)","Friedrich Merz (CDU)","Robert Habeck (Grüne)","Markus Söder (CSU)"], correct:1, explanation:"Friedrich Merz (CDU) ist seit Mai 2025 Bundeskanzler (Koalition CDU/CSU + SPD)." }
];

var TOTAL = QUESTIONS.length;

var state = {
  screen: "start",
  playerName: "",
  adminMode: false,
  questions: [],
  idx: 0,
  answered: false,
  selectedIdx: null,
  isCorrect: false,
  correctCount: 0,
  wrongCount: 0,
  answers: [],
  matchSelections: {},
  matchSubmitted: false,
  matchUserAnswers: null,
  leaderboard: null,
  lbLoading: false,
  lbError: false,
  saveStatus: "",
  saveDebug: "",
  resultTab: "leaderboard",
  activeTotal: TOTAL
};

function shuffle(a) {
  var b = a.slice();
  for (var i = b.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = b[i]; b[i] = b[j]; b[j] = tmp;
  }
  return b;
}

function getGrade(pct) {
  if (pct >= 92) return "1 (Sehr gut)";
  if (pct >= 81) return "2 (Gut)";
  if (pct >= 67) return "3 (Befriedigend)";
  if (pct >= 50) return "4 (Ausreichend)";
  if (pct >= 30) return "5 (Mangelhaft)";
  return "6 (Ungenügend)";
}

function esc(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function nameOk() {
  return state.playerName.trim().length >= 2;
}

function handleNameInput() {
  var el = document.getElementById("nameField");
  if (el) state.playerName = el.value;
  var b1 = document.getElementById("btnStart");
  var b2 = document.getElementById("btnAdmin");
  if (b1) b1.disabled = !nameOk();
  if (b2) b2.disabled = !nameOk();
}

function doStart(isAdmin) {
  if (!nameOk()) return;
  state.adminMode = isAdmin;
  var qs = shuffle(QUESTIONS);
  if (isAdmin) qs = qs.slice(0, ADMIN_TEST_COUNT);
  state.questions = qs;
  state.activeTotal = qs.length;
  state.screen = "quiz";
  state.idx = 0;
  state.answered = false;
  state.selectedIdx = null;
  state.isCorrect = false;
  state.correctCount = 0;
  state.wrongCount = 0;
  state.answers = [];
  state.matchSelections = {};
  state.matchSubmitted = false;
  state.matchUserAnswers = null;
  state.leaderboard = null;
  state.lbLoading = false;
  state.lbError = false;
  state.saveStatus = "";
  state.saveDebug = "";
  state.resultTab = "leaderboard";
  render();
}

function doSelectOption(i) {
  if (state.answered) return;
  var q = state.questions[state.idx];
  var correct = (i === q.correct);
  state.selectedIdx = i;
  state.isCorrect = correct;
  state.answered = true;
  if (correct) state.correctCount++; else state.wrongCount++;
  state.answers.push({ isCorrect: correct });
  render();
}

function doSelectMatch(pi, val) {
  if (state.matchSubmitted) return;
  state.matchSelections[pi] = val;
  render();
}

function doSubmitMatch() {
  var q = state.questions[state.idx];
  if (Object.keys(state.matchSelections).length < q.pairs.length) return;
  var ok = true;
  for (var i = 0; i < q.pairs.length; i++) {
    if (state.matchSelections[i] !== q.pairs[i].match) ok = false;
  }
  state.matchSubmitted = true;
  state.answered = true;
  state.isCorrect = ok;
  state.matchUserAnswers = {};
  for (var k in state.matchSelections) state.matchUserAnswers[k] = state.matchSelections[k];
  if (ok) state.correctCount++; else state.wrongCount++;
  state.answers.push({ isCorrect: ok });
  render();
}

function doNext() {
  if (state.idx + 1 >= state.questions.length) {
    state.screen = "result";
    saveResult();
    loadLeaderboard();
  } else {
    state.idx++;
    state.answered = false;
    state.selectedIdx = null;
    state.isCorrect = false;
    state.matchSelections = {};
    state.matchSubmitted = false;
    state.matchUserAnswers = null;
  }
  render();
  window.scrollTo(0, 0);
}

function doSwitchTab(t) {
  state.resultTab = t;
  render();
}

function doRestart() {
  state.screen = "start";
  render();
}

function doRetryLb() {
  loadLeaderboard();
}

function saveResult() {
  var pct = Math.round(state.correctCount / state.activeTotal * 100);
  var payload = {
    name: (state.adminMode ? "[TEST] " : "") + state.playerName.trim(),
    prozent: pct,
    note: getGrade(pct),
    richtig: state.correctCount,
    total: state.activeTotal
  };
  state.saveStatus = "saving";
  state.saveDebug = "";
  render();

  fetch(SHEET_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  }).then(function() {
    state.saveStatus = "success";
    state.saveDebug = "";
    render();
  }).catch(function(err) {
    state.saveStatus = "error";
    state.saveDebug = "POST Fehler: " + err.message;
    render();
  });
}

function loadLeaderboard() {
  state.lbLoading = true;
  state.lbError = false;
  render();

  fetch(SHEET_URL + "?t=" + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function(data) {
      if (!Array.isArray(data)) throw new Error("Keine gültige Liste erhalten");
      state.leaderboard = data;
      state.lbLoading = false;
      render();
    })
    .catch(function(err) {
      state.lbError = true;
      state.lbLoading = false;
      state.saveDebug = "Laden fehlgeschlagen: " + err.message + "\n\nPrüfe:\n1) Apps Script: Bereitstellen > Web-App > Zugriff auf 'Jeder'\n2) doGet()-Funktion im Script vorhanden\n3) Nach Code-Änderung NEUE Bereitstellung erstellen";
      render();
    });
}

function render() {
  var app = document.getElementById("app");
  if (state.screen === "start") app.innerHTML = renderStart();
  else if (state.screen === "quiz") app.innerHTML = renderQuiz();
  else if (state.screen === "result") app.innerHTML = renderResult();
}

function renderStart() {
  var dis = nameOk() ? "" : "disabled";
  return '<div class="start-screen">' +
    '<h1>Wirtschafts- und Sozialkunde</h1>' +
    '<p class="desc">Gesellenprüfung – Übungsversion 2026</p>' +
    '<p class="meta">' + TOTAL + ' Fragen · Multiple Choice & Zuordnung · mit Erklärungen</p>' +
    '<div class="name-input-wrap">' +
    '<label for="nameField">Dein Name</label>' +
    '<input class="name-input" id="nameField" type="text" placeholder="Vor- und Nachname" maxlength="40" value="' + esc(state.playerName) + '" oninput="handleNameInput()" onkeydown="if(event.key===\'Enter\')doStart(false)">' +
    '</div>' +
    '<button class="btn-start" id="btnStart" onclick="doStart(false)" ' + dis + '>Prüfung starten</button>' +
    '<button class="btn-admin" id="btnAdmin" onclick="doStart(true)" ' + dis + '>⚙ Schnelltest (' + ADMIN_TEST_COUNT + ' Fragen)</button>' +
    '<div class="hints-box">' +
    '<div class="label">Hinweise</div>' +
    '<ul>' +
    '<li>Die Fragen erscheinen in zufälliger Reihenfolge</li>' +
    '<li>Nach jeder Antwort erhältst du eine Erklärung</li>' +
    '<li>Am Ende siehst du deine Note und die Bestenliste</li>' +
    '<li>Dein Ergebnis wird automatisch gespeichert</li>' +
    '</ul></div></div>';
}

function renderQuiz() {
  var q = state.questions[state.idx];
  var tot = state.activeTotal;
  var pct = (state.idx / tot * 100);
  var h = "";

  if (state.adminMode) h += '<div style="text-align:center;margin-bottom:16px"><span class="admin-badge">⚙ Testmodus</span></div>';

  h += '<div class="progress-wrap"><div class="progress-info"><span>Frage ' + (state.idx + 1) + ' von ' + tot + '</span><div class="stats"><span class="correct">' + state.correctCount + ' richtig</span><span class="wrong">' + state.wrongCount + ' falsch</span></div></div><div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';

  h += '<div class="question-wrap"><div class="question-text"><span class="question-num">#' + q.id + '</span>' + esc(q.question) + '</div>';

  if (q.type === "single") {
    h += '<div class="options">';
    for (var i = 0; i < q.options.length; i++) {
      var c = "option-btn";
      if (state.answered) {
        if (i === q.correct) c += " is-correct";
        else if (i === state.selectedIdx && !state.isCorrect) c += " is-wrong";
        else c += " dimmed";
      }
      h += '<button class="' + c + '" onclick="doSelectOption(' + i + ')" ' + (state.answered ? "disabled" : "") + '><span class="letter">' + String.fromCharCode(65 + i) + ')</span>' + esc(q.options[i]) + '</button>';
    }
    h += '</div>';
  } else {
    for (var pi = 0; pi < q.pairs.length; pi++) {
      var pair = q.pairs[pi];
      var sel = state.matchSubmitted ? state.matchUserAnswers[pi] : state.matchSelections[pi];
      var ic = "match-item";
      if (state.matchSubmitted) ic += (sel === pair.match) ? " is-correct" : " is-wrong";
      h += '<div class="' + ic + '"><div class="text">' + esc(pair.item) + '</div><div class="match-btns">';
      for (var oi = 0; oi < q.matchOptions.length; oi++) {
        var opt = q.matchOptions[oi];
        var bc = "match-btn";
        if (sel === opt) {
          if (state.matchSubmitted) bc += (opt === pair.match) ? " selected-correct" : " selected-wrong";
          else bc += " selected";
        }
        h += '<button class="' + bc + '" onclick="doSelectMatch(' + pi + ',\'' + opt + '\')" ' + (state.matchSubmitted ? "disabled" : "") + '>' + esc(opt) + '</button>';
      }
      h += '</div>';
      if (state.matchSubmitted && sel !== pair.match) h += '<div class="correction">Richtig: ' + esc(pair.match) + '</div>';
      h += '</div>';
    }
    if (!state.matchSubmitted) {
      var af = Object.keys(state.matchSelections).length >= q.pairs.length;
      h += '<button class="btn-check ' + (af ? "active" : "") + '" onclick="doSubmitMatch()" ' + (af ? "" : "disabled") + '>Antwort prüfen</button>';
    }
  }

  if (state.answered) {
    var cl = state.isCorrect ? "correct" : "wrong";
    var vt = state.isCorrect ? "✓ Richtig!" : "✗ Leider falsch";
    var bt = (state.idx + 1 >= state.questions.length) ? "Auswertung anzeigen" : "Nächste Frage →";
    h += '<div class="explanation ' + cl + '"><div class="verdict">' + vt + '</div><div class="expl-text">' + esc(q.explanation) + '</div></div>';
    h += '<div class="next-row"><button class="btn-next" onclick="doNext()">' + bt + '</button></div>';
  }

  h += '</div>';
  return h;
}

function renderResult() {
  var tot = state.activeTotal;
  var pct = Math.round(state.correctCount / tot * 100);
  var grade = getGrade(pct);
  var emoji = pct >= 81 ? "🏆" : pct >= 67 ? "👍" : pct >= 50 ? "📝" : "📚";

  var sv = "";
  if (state.saveStatus === "saving") sv = '<div class="save-status"><span class="spinner"></span>Ergebnis wird gespeichert…</div>';
  else if (state.saveStatus === "success") sv = '<div class="save-status success">✓ Ergebnis gesendet</div>';
  else if (state.saveStatus === "error") sv = '<div class="save-status error">✗ Speichern fehlgeschlagen</div>';

  var h = '<div class="result-screen">';
  if (state.adminMode) h += '<div style="margin-bottom:12px"><span class="admin-badge">⚙ Testmodus – Ergebnis als [TEST] markiert</span></div>';
  h += '<div class="emoji">' + emoji + '</div>';
  h += '<h1>Geschafft, ' + esc(state.playerName) + '!</h1>';
  h += '<div class="pct ' + (pct >= 50 ? "pass" : "fail") + '">' + pct + '%</div>';
  h += '<div class="count">' + state.correctCount + ' von ' + tot + ' Fragen richtig</div>';
  h += '<div class="grade">Note: ' + grade + '</div>';
  h += sv;

  h += '<div class="tabs">';
  h += '<button class="tab-btn ' + (state.resultTab === "leaderboard" ? "active" : "") + '" onclick="doSwitchTab(\'leaderboard\')">🏅 Bestenliste</button>';
  h += '<button class="tab-btn ' + (state.resultTab === "overview" ? "active" : "") + '" onclick="doSwitchTab(\'overview\')">Deine Antworten</button>';
  h += '</div>';

  if (state.resultTab === "overview") {
    h += '<div class="result-section-title">Übersicht aller Fragen</div>';
    for (var i = 0; i < state.questions.length; i++) {
      var q = state.questions[i];
      var a = state.answers[i];
      var cl2 = (a && a.isCorrect) ? "c" : "w";
      var v = (a && a.isCorrect) ? "✓ Richtig" : "✗ Falsch";
      var t = esc(q.question);
      if (t.length > 90) t = t.substring(0, 90) + "…";
      h += '<div class="result-item ' + cl2 + '"><div class="q-text"><span class="q-num">#' + q.id + '</span> ' + t + '</div><div class="q-verdict">' + v + '</div></div>';
    }
  } else {
    h += '<div class="leaderboard"><div class="leaderboard-title"><span>🏅</span> Bestenliste</div>';
    if (state.lbLoading) {
      h += '<div class="lb-loading"><span class="spinner"></span>Bestenliste wird geladen…</div>';
    } else if (state.lbError) {
      h += '<div class="lb-error">Bestenliste konnte nicht geladen werden.<br><a href="#" onclick="doRetryLb();return false;" style="color:#818cf8">Nochmal versuchen</a></div>';
    } else if (state.leaderboard && state.leaderboard.length > 0) {
      h += '<table class="lb-table"><thead><tr><th>#</th><th>Name</th><th>Ergebnis</th><th>Note</th><th>Datum</th></tr></thead><tbody>';
      var medals = { 1: "🥇", 2: "🥈", 3: "🥉" };
      for (var j = 0; j < state.leaderboard.length; j++) {
        var e = state.leaderboard[j];
        var r = j + 1;
        var m = medals[r] || "";
        var rc = r === 1 ? "gold" : r === 2 ? "silver" : r === 3 ? "bronze" : "";
        var pc = e.prozent >= 67 ? "good" : e.prozent >= 50 ? "ok" : "bad";
        var rawDate = String(e.datum || "");
        var niceDate = rawDate;
        try { var dd = new Date(rawDate); if (!isNaN(dd)) niceDate = dd.toLocaleDateString("de-DE"); } catch(x) {}
        h += '<tr><td><span class="lb-rank ' + rc + '">' + (m ? '<span class="lb-medal">' + m + '</span>' : '') + r + '</span></td>';
        h += '<td class="lb-name">' + esc(e.name || "") + '</td>';
        h += '<td class="lb-pct ' + pc + '">' + e.prozent + '%</td>';
        h += '<td class="lb-note">' + esc(e.note || "") + '</td>';
        h += '<td class="lb-datum">' + esc(niceDate) + '</td></tr>';
      }
      h += '</tbody></table>';
    } else {
      h += '<div class="lb-error">Noch keine Einträge vorhanden.</div>';
    }
    h += '</div>';
  }

  h += '<button class="btn-restart" onclick="doRestart()">Nochmal versuchen</button></div>';
  return h;
}

render();
</script>
</body>
</html>
