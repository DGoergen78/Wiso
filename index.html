<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wirtschafts- und Sozialkunde</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f2ec;
      --text: #1a1a18;
      --accent: #c84b2f;
      --muted: #8a8578;
      --border: #d9d4ca;
      --hover-bg: #1a1a18;
      --hover-text: #f5f2ec;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 80px 40px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 64px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 32px;
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--text);
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    nav ul li {
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }

    nav ul li:nth-child(1) { animation-delay: 0.1s; }
    nav ul li:nth-child(2) { animation-delay: 0.2s; }
    nav ul li:nth-child(3) { animation-delay: 0.3s; }
    nav ul li:nth-child(4) { animation-delay: 0.4s; }
    nav ul li:nth-child(5) { animation-delay: 0.5s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    nav ul li a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 0;
      text-decoration: none;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 400;
      transition: all 0.2s ease;
      gap: 16px;
    }

    nav ul li a:hover {
      color: var(--accent);
      padding-left: 8px;
    }

    nav ul li a .arrow {
      font-size: 1.1rem;
      transition: transform 0.2s ease;
      color: var(--muted);
      flex-shrink: 0;
    }

    nav ul li a:hover .arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    footer {
      margin-top: 64px;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p class="label">Übersicht</p>
      <h1>Wirtschafts- und Sozialkunde</h1>
    </header>
    <nav>
      <ul>
         <li>
          <a href="Uebungsklausur2023.html">
            Übungsprüfung Wiso (2023 angepasst auf 2026)
            <span class="arrow">→</span>
          </a>
        </li>      
      </ul>
    </nav>
     <nav>
      <ul>
         <li>
          <a href="wiso-vorbereitung-2026.html">
            Prüfungsvorbereitung Wiso 2026
            <span class="arrow">→</span>
          </a>
        </li>      
      </ul>
    </nav> 
    <nav>
      <ul>
         <li>
          <a href="wiso-vorbereitung-2026_mehrFragen.html">
            Prüfungsvorbereitung Wiso 2026 (zusätzliche Fragen)
            <span class="arrow">→</span>
          </a>
        </li>      
      </ul>
    </nav>
    <nav>
      <ul>
         <li>
          <a href="sozialschutz-quiz.html">
             Sozialschutz Quiz
            <span class="arrow">→</span>
          </a>
        </li>      
      </ul>
    </nav>
     <nav>
      <ul>
         <li>
          <a href="wirtschaftssysteme.html">
             Wirtschaftssysteme Quiz
            <span class="arrow">→</span>
          </a>
        </li>      
      </ul>
    </nav>    
    <footer>
    </footer>
  </div>
</body>
</html>
